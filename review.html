<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>번역 검수 도구</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: rgba(255,255,255,0.03);
      --surface2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --ph: #d2a8ff;
      --num: #58a6ff;
      --lang: #ffa657;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; gap: 6px;
      height: 44px; padding: 0 16px;
      background: rgba(13,17,23,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-weight: 900; font-size: 13px; color: var(--text); margin-right: 6px; }
    .nav a {
      text-decoration: none; font-size: 12px; font-weight: 700;
      color: var(--muted); padding: 5px 10px;
      border-radius: 8px; border: 1px solid transparent; transition: .1s;
    }
    .nav a:hover { color: var(--text); background: var(--surface2); }
    .nav a.active {
      color: var(--accent);
      border-color: rgba(88,166,255,0.35);
      background: rgba(88,166,255,0.1);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; flex-wrap: wrap;
      background: rgba(255,255,255,0.015);
      border-bottom: 1px solid var(--border);
    }
    .sep { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }

    /* Action buttons */
    .btn {
      display: inline-flex; align-items: center;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text); font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: .1s;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.primary {
      background: rgba(88,166,255,0.15);
      border-color: rgba(88,166,255,0.4);
      color: #79c0ff;
    }
    .btn.primary:hover { background: rgba(88,166,255,0.25); }
    .btn.ghost { background: transparent; }
    .btn.ghost:hover { background: var(--surface2); }

    /* Mode buttons (radio hidden) */
    .mode-group {
      display: flex;
      border: 1px solid var(--border2);
      border-radius: 8px; overflow: hidden;
    }
    .mode-group label {
      display: flex; align-items: center;
      padding: 5px 11px; font-size: 12px; font-weight: 700;
      color: var(--muted); cursor: pointer; user-select: none;
      border-right: 1px solid var(--border); transition: .1s;
    }
    .mode-group label:last-child { border-right: 0; }
    .mode-group label.active {
      background: rgba(88,166,255,0.12); color: #79c0ff;
    }
    .mode-group label:not(.active):hover { background: var(--surface2); color: var(--text); }
    .mode-group input[type="radio"] { display: none; }

    /* Toggle check labels */
    .chk-label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 700;
      cursor: pointer; user-select: none; transition: .1s;
    }
    .chk-label input { display: none; }
    .chk-label.on {
      border-color: rgba(88,166,255,0.4);
      background: rgba(88,166,255,0.1);
      color: #79c0ff;
    }
    .chk-label:not(.on):hover { background: var(--surface2); color: var(--text); }

    /* Stat pills */
    .stat {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 8px; border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.d-total { background: var(--muted); }
    .dot.d-ph    { background: var(--ph); }
    .dot.d-num   { background: var(--num); }
    .dot.d-lang  { background: var(--lang); }

    /* ── MAIN LAYOUT ── */
    .main {
      display: grid;
      grid-template-columns: 540px 1fr;
      gap: 12px;
      padding: 12px 16px 32px;
      max-width: 1900px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 1080px) { .main { grid-template-columns: 1fr; } }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .card-head {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 8px 12px; gap: 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }
    .card-title { font-size: 12px; font-weight: 800; }
    .card-meta  { font-size: 11px; color: var(--muted); }

    /* ── INPUT ── */
    .input-split {
      display: grid; grid-template-columns: 1fr 1fr;
    }
    .input-side { display: flex; flex-direction: column; }
    .input-side:first-child { border-right: 1px solid var(--border); }
    .input-label {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 10px; font-size: 11px; font-weight: 700; color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.1);
    }
    textarea {
      width: 100%; height: 420px; border: 0; outline: none; resize: vertical;
      padding: 10px 12px;
      background: rgba(0,0,0,0.12); color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px; line-height: 1.65;
    }
    #tsvBox { display: none; }
    #tsvBox textarea { height: 420px; }

    /* ── RIGHT ── */
    .right-area { display: flex; flex-direction: column; gap: 10px; }

    /* Results table */
    .table-wrap { overflow: auto; max-height: 480px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; }
    thead th {
      position: sticky; top: 0; z-index: 1;
      background: rgba(13,17,23,0.98);
      border-bottom: 1px solid var(--border2);
      padding: 7px 10px; text-align: left;
      font-size: 11px; font-weight: 700; color: var(--muted);
    }
    tbody td {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding: 5px 10px; vertical-align: top;
    }
    tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .col-no { width: 130px; }
    .col-l  { width: 44%; }
    .col-r  { width: 56%; }
    .cell {
      border: 1px solid transparent; border-radius: 7px;
      padding: 4px 6px; min-height: 22px;
      white-space: pre-wrap; word-break: break-word;
      background: rgba(0,0,0,0.06); outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px; line-height: 1.6;
    }
    .cell:focus { border-color: rgba(88,166,255,0.5); background: rgba(88,166,255,0.06); }
    .hl-ph   { box-shadow: inset 0 0 0 2px rgba(210,168,255,0.55); }
    .hl-num  { box-shadow: inset 0 0 0 2px rgba(88,166,255,0.55); }
    .hl-lang { box-shadow: inset 0 0 0 2px rgba(255,166,87,0.55); }

    .badge-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .loc { font-family: monospace; font-size: 11px; color: var(--muted); }
    .badge {
      display: inline-flex; align-items: center;
      padding: 1px 5px; border-radius: 999px;
      font-size: 10px; font-weight: 800; border: 1px solid;
    }
    .badge.ph  { border-color: rgba(210,168,255,0.4); background: rgba(210,168,255,0.1); color: #d2a8ff; }
    .badge.num { border-color: rgba(88,166,255,0.4);  background: rgba(88,166,255,0.1);  color: #79c0ff; }
    .badge.lang{ border-color: rgba(255,166,87,0.4);  background: rgba(255,166,87,0.1);  color: #ffa657; }

    /* ── SIDE PANELS ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 1500px) { .panels { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 900px)  { .panels { grid-template-columns: 1fr; } }

    .panel-body {
      padding: 8px 10px;
      max-height: 300px; overflow-y: auto;
      font-size: 12px;
    }

    /* Language panel */
    .lang-ctrl {
      display: flex; flex-direction: column; gap: 7px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.05);
    }
    .lang-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .lang-lbl { font-size: 11px; font-weight: 800; color: var(--muted); min-width: 28px; }

    /* Scan target toggles */
    .scan-tog {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 6px;
      border: 1px solid var(--border); font-size: 11px; font-weight: 700;
      color: var(--muted); cursor: pointer; user-select: none; transition: .1s;
    }
    .scan-tog input { display: none; }
    .scan-tog.on {
      border-color: rgba(255,166,87,0.45);
      background: rgba(255,166,87,0.1);
      color: #ffa657;
    }

    /* Preset mini buttons */
    .mini-btn {
      padding: 3px 8px; border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 11px; font-weight: 700; cursor: pointer; transition: .1s;
    }
    .mini-btn:hover { background: var(--surface2); color: var(--text); }

    /* Summary chips */
    .sum-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
    }
    .sum-chip .k {
      font-family: monospace; font-weight: 900;
      color: rgba(255,166,87,0.9); font-size: 10px;
    }

    /* Allowlist */
    .allow-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .allow-item {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.1);
      font-size: 11px; color: var(--muted);
      cursor: pointer; user-select: none; transition: .1s;
    }
    .allow-item input { display: none; }
    .allow-item .code {
      font-family: monospace; font-weight: 900;
      color: rgba(255,166,87,0.75); font-size: 10px;
    }
    .allow-item.on {
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
      color: var(--text);
    }
    .allow-item .c-cnt { font-size: 10px; color: var(--muted); }

    /* Keyword exclusion */
    .kw-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px; border-radius: 7px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.1);
    }
    .kw-lbl { font-size: 11px; font-weight: 800; color: var(--muted); white-space: nowrap; }
    .kw-input {
      flex: 1; border: 0; outline: none;
      background: transparent; color: var(--text);
      font-family: monospace; font-size: 11px;
    }
    .kw-input::placeholder { color: rgba(125,133,144,0.5); }

    /* Panel items */
    .p-item {
      border: 1px solid var(--border);
      border-radius: 9px; padding: 7px 8px;
      margin-bottom: 5px; background: rgba(0,0,0,0.1);
    }
    .p-item:last-child { margin-bottom: 0; }
    .p-head {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 5px;
    }
    .p-detail { font-size: 11px; color: var(--muted); line-height: 1.6; }
    .p-line {
      padding-top: 3px; border-top: 1px dashed rgba(255,255,255,0.08);
      margin-top: 3px;
    }
    .p-line:first-child { border-top: 0; margin-top: 0; padding-top: 0; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: rgba(230,237,243,0.9); font-size: 11px;
    }
    .jump-btn {
      padding: 2px 8px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .jump-btn:hover { background: var(--surface2); color: var(--text); }

    .empty { color: var(--muted); font-size: 12px; }
    .hide  { display: none !important; }

    /* Tooltip */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 7px); left: 50%;
      transform: translateX(-50%);
      max-width: 240px; white-space: normal;
      padding: 6px 9px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,14,22,0.97);
      color: rgba(230,237,243,0.92); font-size: 11px; line-height: 1.45;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none; transition: opacity .1s; z-index: 999;
    }
    [data-tip]:hover::after { opacity: 1; }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <span class="nav-brand">TOOLS</span>
  <a href="review.html" data-page="review.html">번역 검수</a>
  <a href="placeholder.html" data-page="placeholder.html">플레이스홀더</a>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="btn primary" id="analyzeBtn">분석</button>
  <button class="btn ghost"   id="clearBtn">초기화</button>
  <button class="btn ghost"   id="copyBtn">TSV 복사</button>

  <div class="sep"></div>

  <div class="mode-group">
    <label data-tip="빈 줄 2개 이상으로 여러 셀을 구분합니다">
      <input type="radio" name="mode" value="multicell" checked> 멀티셀
    </label>
    <label data-tip="좌우 각각 하나의 덩어리를 줄 단위로 비교합니다">
      <input type="radio" name="mode" value="block"> 단일
    </label>
    <label data-tip="원본 TAB 번역 형태의 TSV를 붙여넣습니다">
      <input type="radio" name="mode" value="tsv"> TSV
    </label>
  </div>

  <div class="sep"></div>

  <label class="chk-label" id="lbl-ph"    data-tip="«…» 플레이스홀더 일치 검사"><input type="checkbox" id="checkPlaceholders"> PH</label>
  <label class="chk-label" id="lbl-num"   data-tip="좌우 숫자 목록 일치 검사"><input type="checkbox" id="checkNumbers"> 숫자</label>
  <label class="chk-label" id="lbl-empty" data-tip="셀 내 빈 줄을 제거하고 비교"><input type="checkbox" id="ignoreEmptyLines"> 빈줄무시</label>
  <label class="chk-label" id="lbl-hdr"   data-tip="TSV 복사 시 컬럼명 행 포함"><input type="checkbox" id="tsvHeader"> TSV헤더</label>

  <div class="sep"></div>

  <span class="stat"><span class="dot d-total"></span><span id="statTotal">행 0</span></span>
  <span class="stat"><span class="dot d-ph"></span><span id="statPh">PH 0</span></span>
  <span class="stat"><span class="dot d-num"></span><span id="statNum">NUM 0</span></span>
  <span class="stat"><span class="dot d-lang"></span><span id="statLang">LANG 0</span></span>
</div>

<!-- MAIN -->
<div class="main">

  <!-- INPUT -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">입력</span>
      <span class="card-meta" id="inputMeta">멀티셀 · 셀 사이 빈 줄 2개 이상</span>
    </div>

    <div id="blockBox">
      <div class="input-split">
        <div class="input-side">
          <div class="input-label"><span>원본</span><span id="leftCount"></span></div>
          <textarea id="leftText"  spellcheck="false" placeholder="원본을 붙여넣으십시오.&#10;멀티셀: 셀 사이를 빈 줄 2개 이상으로 구분하십시오."></textarea>
        </div>
        <div class="input-side">
          <div class="input-label"><span>번역</span><span id="rightCount"></span></div>
          <textarea id="rightText" spellcheck="false" placeholder="번역을 붙여넣으십시오."></textarea>
        </div>
      </div>
    </div>

    <div id="tsvBox">
      <textarea id="tsvInput" spellcheck="false" placeholder="원본&#9;번역&#10;Trade&#9;Handel&#10;..."></textarea>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-area">

    <!-- Results -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">비교 결과</span>
        <span class="card-meta">
          <span style="color:var(--ph)">■</span> PH &nbsp;
          <span style="color:var(--num)">■</span> 숫자 &nbsp;
          <span style="color:var(--lang)">■</span> 숨은 문자
        </span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-no">위치</th>
              <th class="col-l">원본</th>
              <th class="col-r">번역</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="3" class="empty" style="padding:14px 12px">내용을 입력하면 자동으로 분석됩니다.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Side panels -->
    <div class="panels">

      <!-- Language -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">숨은 문자 탐지</span>
          <span class="card-meta" id="langMeta">0행</span>
        </div>
        <div class="lang-ctrl">

          <!-- 대상 + 요약 -->
          <div class="lang-row">
            <span class="lang-lbl">대상</span>
            <label class="scan-tog" id="st-l"><input type="checkbox" id="scanLeft">왼쪽</label>
            <label class="scan-tog" id="st-r"><input type="checkbox" id="scanRight">오른쪽</label>
            <span class="sum-chip"><span class="k">KOR</span><span id="sumKOR">0</span></span>
            <span class="sum-chip"><span class="k">THA</span><span id="sumTHA">0</span></span>
            <span class="sum-chip"><span class="k">LAT</span><span id="sumLAT">0</span></span>
          </div>

          <!-- 허용 프리셋 -->
          <div class="lang-row">
            <span class="lang-lbl">허용</span>
            <button class="mini-btn" id="presetAll"     data-tip="모든 문자 허용 (경고 해제)">전체</button>
            <button class="mini-btn" id="presetLatTha"  data-tip="LAT+THA만 허용, 숨은 한글 탐지에 적합">LAT+THA</button>
            <button class="mini-btn" id="presetLatOnly" data-tip="LAT만 허용">LAT만</button>
          </div>

          <!-- 허용 목록 -->
          <div class="allow-list" id="langAllowList"></div>

          <!-- 키워드 예외 -->
          <div class="kw-row">
            <span class="kw-lbl">예외</span>
            <input class="kw-input" id="langExcludeInput" type="text"
              placeholder="Lv, CL, HP … (콤마로 구분)"
              spellcheck="false" autocomplete="off">
          </div>

        </div>
        <div class="panel-body" id="langBody">
          <span class="empty">대상(왼쪽/오른쪽)을 체크하면 탐지를 시작합니다.</span>
        </div>
      </div>

      <!-- PH -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">플레이스홀더 오류</span>
          <span class="card-meta" id="phMeta">0</span>
        </div>
        <div class="panel-body" id="phBody">
          <span class="empty">PH 검사를 켜고 분석하면 결과가 표시됩니다.</span>
        </div>
      </div>

      <!-- NUM -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">숫자 오류</span>
          <span class="card-meta" id="numMeta">0</span>
        </div>
        <div class="panel-body" id="numBody">
          <span class="empty">숫자 검사를 켜고 분석하면 결과가 표시됩니다.</span>
        </div>
      </div>

    </div><!-- /panels -->
  </div><!-- /right-area -->

</div><!-- /main -->

<script>
const $ = id => document.getElementById(id);

// Elements
const analyzeBtn      = $("analyzeBtn");
const clearBtn        = $("clearBtn");
const copyBtn         = $("copyBtn");
const leftText        = $("leftText");
const rightText       = $("rightText");
const leftCount       = $("leftCount");
const rightCount      = $("rightCount");
const blockBox        = $("blockBox");
const tsvBox          = $("tsvBox");
const tsvInput        = $("tsvInput");

  return el ? el.value : "multicell";
}

// ── HELPERS ──
function escHtml(s) {
  return (s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function toTSV(s) { return (s ?? "").replace(/\t/g," ").replace(/\r?\n/g,"\\n").trim(); }

// ── PLACEHOLDER ──
function extractPH(text) {
  const out = [], re = /«[^»]*»|<<[\s\S]*?>>/g;
  let m;
  while ((m = re.exec(text ?? "")) !== null) out.push(m[0]);
  return out;
}
function normPH(ph) { return (ph ?? "").normalize("NFC").replace(/\s+/g," ").trim(); }
function checkPHMismatch(l, r) {
  const lPH = extractPH(l), rPH = extractPH(r);
  const lN = lPH.map(normPH), rN = rPH.map(normPH);
  const iss = [];
  for (let i = 0; i < lPH.length; i++) {
    if (i >= rPH.length) {
      iss.push({ type:"missing_right", index:i, left:lPH[i], right:null, movedTo:rN.indexOf(lN[i]) });
      continue;
    }
    if (lN[i] !== rN[i]) {
      const moved = rN.indexOf(lN[i]);
      iss.push({ type: moved >= 0 ? "different_or_moved" : "different", index:i, left:lPH[i], right:rPH[i], movedTo:moved });
    }
  }
  for (let j = lPH.length; j < rPH.length; j++)
    iss.push({ type:"extra_right", index:j, left:null, right:rPH[j], movedTo:null });
  return iss;
}

// ── NUMBERS ──
function extractNums(t) { return (t ?? "").match(/\d+/g) || []; }
function arrEq(a, b) { return a.length === b.length && a.every((v,i) => v === b[i]); }

// ── LINE / CELL UTILS ──
function splitLines(text) {
  const arr = (text ?? "").replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  return ignoreEmpty.checked ? arr.filter(x => x.trim() !== "") : arr;
}
function splitCells(text) {
  const lines = (text ?? "").replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  const cells = [];
  let cur = [], blanks = 0;
  const flush = () => { const s = cur.join("\n").trimEnd(); if (s.trim()) cells.push(s); cur = []; };
  for (const line of lines) {
    if (line.trim() === "") { blanks++; if (blanks >= 2) flush(); else cur.push(line); }
    else { blanks = 0; cur.push(line); }
  }
  flush();
  return cells;
}
function parseTSV(text) {
  const out = []; let no = 1;
  for (const line of (text ?? "").replace(/\r\n/g,"\n").split("\n")) {
    if (line.trim()) {
      const [left, ...rest] = line.split("\t");
      out.push({ key:`S1-L${no}`, cell:1, line:no, left: left ?? "", right: rest.join("\t") });
    }
    no++;
  }
  return out;
}

// ── BUILD ROWS ──
function buildRows() {
  const mode = getMode();
  if (mode === "tsv") {
    leftCount.textContent = ""; rightCount.textContent = "";
    return { rows: parseTSV(tsvInput.value || "") };
  }
  if (mode === "block") {
    const L = splitLines(leftText.value || ""), R = splitLines(rightText.value || "");
    leftCount.textContent = ""; rightCount.textContent = "";
    const out = [];
    for (let i = 0; i < Math.max(L.length, R.length); i++)
      out.push({ key:`S1-L${i+1}`, cell:1, line:i+1, left: L[i] ?? "", right: R[i] ?? "" });
    return { rows: out };
  }
  // multicell
  const Lc = splitCells(leftText.value || ""), Rc = splitCells(rightText.value || "");
  leftCount.textContent  = `${Lc.length}셀`;
  rightCount.textContent = `${Rc.length}셀`;
  const out = [];
  for (let c = 0; c < Math.max(Lc.length, Rc.length); c++) {
    const LL = splitLines(Lc[c] ?? ""), RR = splitLines(Rc[c] ?? "");
    for (let i = 0; i < Math.max(LL.length, RR.length); i++)
      out.push({ key:`S${c+1}-L${i+1}`, cell:c+1, line:i+1, left: LL[i] ?? "", right: RR[i] ?? "" });
  }
  return { rows: out };
}

// ── LANGUAGE SCAN ──
function isDigit(cp)  { return cp >= 0x30 && cp <= 0x39; }
function isSpace(cp)  { return cp === 0x20 || cp === 0x09 || cp === 0x0A || cp === 0x0D; }
function isPunct(cp)  {
  return (cp >= 0x21 && cp <= 0x2F) || (cp >= 0x3A && cp <= 0x40) ||
         (cp >= 0x5B && cp <= 0x60) || (cp >= 0x7B && cp <= 0x7E);
}
function scriptOf(cp) {
  if ((cp>=0x1100&&cp<=0x11FF)||(cp>=0x3130&&cp<=0x318F)||(cp>=0xAC00&&cp<=0xD7AF)||(cp>=0xA960&&cp<=0xA97F)||(cp>=0xD7B0&&cp<=0xD7FF)) return "KOR";
  if (cp>=0x0E00&&cp<=0x0E7F) return "THA";
  if ((cp>=0x3040&&cp<=0x309F)||(cp>=0x30A0&&cp<=0x30FF)||(cp>=0x31F0&&cp<=0x31FF)) return "JPN";
  if ((cp>=0x4E00&&cp<=0x9FFF)||(cp>=0x3400&&cp<=0x4DBF)) return "CJK";
  if ((cp>=0x0400&&cp<=0x04FF)||(cp>=0x0500&&cp<=0x052F)||(cp>=0x2DE0&&cp<=0x2DFF)||(cp>=0xA640&&cp<=0xA69F)) return "CYR";
  if ((cp>=0x0600&&cp<=0x06FF)||(cp>=0x0750&&cp<=0x077F)||(cp>=0x08A0&&cp<=0x08FF)) return "ARB";
  if (cp>=0x0900&&cp<=0x097F) return "DEV";
  if ((cp>=0x41&&cp<=0x5A)||(cp>=0x61&&cp<=0x7A)||(cp>=0x00C0&&cp<=0x024F)||(cp>=0x1E00&&cp<=0x1EFF)||(cp>=0x2C60&&cp<=0x2C7F)||(cp>=0xA720&&cp<=0xA7FF)) return "LAT";
  if (isSpace(cp) || isDigit(cp) || isPunct(cp)) return null;
  return "ETC";
}
function scanScripts(text) {
  const counts = new Map(), firstHit = new Map();
  const t = text ?? "";
  for (let i = 0; i < t.length; ) {
    const cp = t.codePointAt(i);
    const ch = String.fromCodePoint(cp);
    const code = scriptOf(cp);
    if (code) {
      counts.set(code, (counts.get(code) || 0) + 1);
      if (!firstHit.has(code)) {
        const s = Math.max(0, i-12), e = Math.min(t.length, i+12);
        firstHit.set(code, { snippet: t.slice(s, e), ch });
      }
    }
    i += ch.length;
  }
  return { counts, firstHit };
}
function addCounts(target, src) {
  for (const [k, v] of src.entries()) target.set(k, (target.get(k) || 0) + v);
}
function getExcludeKws() {
  return (langExcludeInput.value || "").split(",").map(k => k.trim()).filter(k => k.length > 0);
}
function applyKwExclude(text, kws) {
  if (!kws.length) return text;
  let r = text;
  for (const kw of kws)
    r = r.replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "g"), "");
  return r;
}

// ── ANALYZE ──
function analyzeRows(snapshotRows) {
  const phIssues = new Map(), numIssues = new Map(), langIssues = new Map(), totalAll = new Map();
  const doLeft = scanLeft.checked, doRight = scanRight.checked;
  const kws = getExcludeKws();

  for (const r of snapshotRows) {
    if (checkPH.checked) {
      const iss = checkPHMismatch(r.left, r.right);
      if (iss.length) phIssues.set(r.key, iss);
    }
    if (checkNum.checked) {
      const lN = extractNums(r.left), rN = extractNums(r.right);
      if (!arrEq(lN, rN)) numIssues.set(r.key, { lNums: lN, rNums: rN });
    }
    if (doLeft || doRight) {
      const lScan = doLeft  ? scanScripts(applyKwExclude(r.left,  kws)) : { counts:new Map(), firstHit:new Map() };
      const rScan = doRight ? scanScripts(applyKwExclude(r.right, kws)) : { counts:new Map(), firstHit:new Map() };
      addCounts(totalAll, lScan.counts);
      addCounts(totalAll, rScan.counts);
      const disL = [...lScan.counts.entries()].filter(([c]) => !langAllow.has(c)).map(([c,n]) => ({ code:c, cnt:n, hit:lScan.firstHit.get(c) }));
      const disR = [...rScan.counts.entries()].filter(([c]) => !langAllow.has(c)).map(([c,n]) => ({ code:c, cnt:n, hit:rScan.firstHit.get(c) }));
      disL.sort((a,b) => b.cnt-a.cnt); disR.sort((a,b) => b.cnt-a.cnt);
      if (disL.length || disR.length)
        langIssues.set(r.key, { cell:r.cell, line:r.line, left:disL, right:disR });
    }
  }
  return { phIssues, numIssues, langIssues, totalAll };
}

// ── ALLOW UI ──
function buildLangAllowUI() {
  if (langAllowList.childElementCount > 0) return;
  for (const s of SCRIPTS) {
    const label = document.createElement("label");
    label.className = "allow-item on";
    label.setAttribute("data-tip", s.tip);

    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = true;
    cb.setAttribute("data-code", s.code);

    const code = document.createElement("span");
    code.className = "code"; code.textContent = s.code;

    const cnt = document.createElement("span");
    cnt.className = "c-cnt"; cnt.id = `cnt_${s.code}`; cnt.textContent = "0";

    label.append(cb, code, cnt);
    cb.addEventListener("change", () => {
      if (cb.checked) { langAllow.add(s.code); label.classList.add("on"); }
      else            { langAllow.delete(s.code); label.classList.remove("on"); }
      if (hasData()) analyzeAndRender();
    });
    langAllowList.appendChild(label);
  }
}

function applyPreset(codes) {
  langAllow.clear();
  codes.forEach(c => langAllow.add(c));
  langAllowList.querySelectorAll('input[data-code]').forEach(cb => {
    cb.checked = langAllow.has(cb.getAttribute("data-code"));
    cb.closest('.allow-item').classList.toggle('on', cb.checked);
  });
  if (hasData()) analyzeAndRender();
}

// ── STATS ──
function updateStats(snapshotRows, analysis) {
  statTotal.textContent = `행 ${snapshotRows.length}`;
  statPh.textContent    = `PH ${analysis.phIssues.size}`;
  statNum.textContent   = `NUM ${analysis.numIssues.size}`;
  statLang.textContent  = `LANG ${analysis.langIssues.size}`;
  phMeta.textContent    = `${analysis.phIssues.size}`;
  numMeta.textContent   = `${analysis.numIssues.size}`;
  langMeta.textContent  = `${analysis.langIssues.size}행`;
  sumKOR.textContent    = analysis.totalAll.get("KOR") || 0;
  sumTHA.textContent    = analysis.totalAll.get("THA") || 0;
  sumLAT.textContent    = analysis.totalAll.get("LAT") || 0;
  for (const s of SCRIPTS) {
    const el = $(`cnt_${s.code}`);
    if (el) el.textContent = analysis.totalAll.get(s.code) || 0;
  }
}

// ── RENDER TABLE ──
function renderTable(snapshotRows, analysis) {
  tbody.innerHTML = "";
  rowElByKey.clear();
  if (!snapshotRows.length) {
    tbody.innerHTML = `<tr><td colspan="3" class="empty" style="padding:14px 12px">결과 없음</td></tr>`;
    return;
  }
  const frag = document.createDocumentFragment();
  for (const r of snapshotRows) {
    const hasPH   = analysis.phIssues.has(r.key);
    const hasNum  = analysis.numIssues.has(r.key);
    const hasLang = analysis.langIssues.has(r.key);

    const tr = document.createElement("tr");

    // No
    const tdNo = document.createElement("td");
    tdNo.className = "col-no";
    const br = document.createElement("div");
    br.className = "badge-row";
    const loc = document.createElement("span");
    loc.className = "loc"; loc.textContent = `S${r.cell}/L${r.line}`;
    br.appendChild(loc);
    if (hasPH)   { const b = document.createElement("span"); b.className = "badge ph";   b.textContent = "PH";   br.appendChild(b); }
    if (hasNum)  { const b = document.createElement("span"); b.className = "badge num";  b.textContent = "NUM";  br.appendChild(b); }
    if (hasLang) { const b = document.createElement("span"); b.className = "badge lang"; b.textContent = "LANG"; br.appendChild(b); }
    tdNo.appendChild(br);
    tr.appendChild(tdNo);

    const mkCell = (txt, ph, num, lang) => {
      const td = document.createElement("td");
      const div = document.createElement("div");
      div.className = "cell" + (ph?" hl-ph":"") + (num?" hl-num":"") + (lang?" hl-lang":"");
      div.contentEditable = "true"; div.spellcheck = false;
      div.textContent = txt ?? "";
      div.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); div.blur(); } });
      td.appendChild(div);
      return { td, div };
    };

    const { td: tdL, div: leftEl  } = mkCell(r.left,  hasPH, hasNum, hasLang);
    const { td: tdR, div: rightEl } = mkCell(r.right, hasPH, hasNum, hasLang);
    tdL.className = "col-l"; tdR.className = "col-r";
    tr.append(tdL, tdR);
    frag.appendChild(tr);
    rowElByKey.set(r.key, { tr, leftEl, rightEl });
  }
  tbody.appendChild(frag);
}

// ── PANEL HELPERS ──
function sortEntries(entries) {
  return [...entries].sort((a, b) => {
    const pa = a[0].match(/S(\d+)-L(\d+)/), pb = b[0].match(/S(\d+)-L(\d+)/);
    return ((pa ? +pa[1] : 0) - (pb ? +pb[1] : 0)) || ((pa ? +pa[2] : 0) - (pb ? +pb[2] : 0));
  });
}
function jumpBtn(key) {
  const btn = document.createElement("button");
  btn.className = "jump-btn"; btn.textContent = "이동";
  btn.addEventListener("click", () => {
    const obj = rowElByKey.get(key);
    if (!obj) return;
    obj.tr.scrollIntoView({ behavior: "smooth", block: "center" });
    obj.rightEl.focus();
  });
  return btn;
}
function makeItem(key, badgeClass, badgeText) {
  const [, s, l] = key.match(/S(\d+)-L(\d+)/) || [, 1, 1];
  const item = document.createElement("div"); item.className = "p-item";
  const head = document.createElement("div"); head.className = "p-head";
  head.innerHTML = `<span class="loc">S${s}/L${l} <span class="badge ${badgeClass}">${badgeText}</span></span>`;
  head.appendChild(jumpBtn(key));
  item.appendChild(head);
  return item;
}

// ── RENDER PANELS ──
function renderPHPanel(analysis) {
  if (!checkPH.checked) { phBody.innerHTML = `<span class="empty">PH 검사가 꺼져 있습니다.</span>`; return; }
  const items = sortEntries(analysis.phIssues);
  if (!items.length) { phBody.innerHTML = `<span class="empty">플레이스홀더 오류 없음 ✓</span>`; return; }
  phBody.innerHTML = "";
  for (const [key, issues] of items) {
    const item = makeItem(key, "ph", "PH");
    const detail = document.createElement("div"); detail.className = "p-detail";
    detail.innerHTML = issues.map(it => {
      const i = it.index + 1;
      if (it.type === "missing_right")     return `<div class="p-line"><span class="muted">#${i} 오른쪽 없음</span><br><span class="mono">${escHtml(it.left)}</span></div>`;
      if (it.type === "moved")             return `<div class="p-line"><span class="muted">#${i} 위치 다름 → right#${it.movedTo+1}</span><br><span class="mono">${escHtml(it.left)}</span></div>`;
      if (it.type === "different")         return `<div class="p-line"><span class="muted">#${i} 내용 다름</span><br><span class="mono">${escHtml(it.left)} → ${escHtml(it.right)}</span></div>`;
      if (it.type === "different_or_moved")return `<div class="p-line"><span class="muted">#${i} 내용/위치 다름</span><br><span class="mono">${escHtml(it.left)}</span></div>`;
      if (it.type === "extra_right")       return `<div class="p-line"><span class="muted">#${i} 오른쪽 추가</span><br><span class="mono">${escHtml(it.right)}</span></div>`;
      return "";
    }).join("");
    item.appendChild(detail);
    phBody.appendChild(item);
  }
}

function renderNumPanel(analysis) {
  if (!checkNum.checked) { numBody.innerHTML = `<span class="empty">숫자 검사가 꺼져 있습니다.</span>`; return; }
  const items = sortEntries(analysis.numIssues);
  if (!items.length) { numBody.innerHTML = `<span class="empty">숫자 오류 없음 ✓</span>`; return; }
  numBody.innerHTML = "";
  for (const [key, info] of items) {
    const item = makeItem(key, "num", "NUM");
    const detail = document.createElement("div"); detail.className = "p-detail";
    detail.innerHTML = `<div class="p-line"><span class="muted">원본:</span> <span class="mono">[${escHtml(info.lNums.join(", "))}]</span></div>`
                     + `<div class="p-line"><span class="muted">번역:</span> <span class="mono">[${escHtml(info.rNums.join(", "))}]</span></div>`;
    item.appendChild(detail);
    numBody.appendChild(item);
  }
}

function renderLangPanel(analysis) {
  if (!(scanLeft.checked || scanRight.checked)) {
    langBody.innerHTML = `<span class="empty">대상(왼쪽/오른쪽)을 체크하면 탐지를 시작합니다.</span>`; return;
  }
  const items = sortEntries(analysis.langIssues);
  if (!items.length) { langBody.innerHTML = `<span class="empty">허용 외 문자 없음 ✓</span>`; return; }
  langBody.innerHTML = "";
  for (const [key, det] of items) {
    const item = makeItem(key, "lang", "LANG");
    const detail = document.createElement("div"); detail.className = "p-detail";
    const fmtSide = (arr, side) => arr.map(x => {
      const snip = x.hit?.snippet ?? "";
      const ch   = x.hit?.ch ?? "";
      const safe = escHtml(snip).replace(escHtml(ch), `<span style="color:var(--lang);font-weight:900;">${escHtml(ch)}</span>`);
      return `<div class="p-line"><span class="muted">${side} [${x.code}] ${x.cnt}개</span><br><span class="mono">${safe}</span></div>`;
    }).join("");
    detail.innerHTML = fmtSide(det.left, "원본") + fmtSide(det.right, "번역");
    item.appendChild(detail);
    langBody.appendChild(item);
  }
}

// ── TSV EXPORT ──
function buildTSV(snapshotRows, analysis) {
  const out = [];
  if (tsvHeader.checked) out.push(["셀","줄","원본","번역","PH","NUM","LANG"].join("\t"));
  for (const r of snapshotRows) {
    out.push([
      r.cell, r.line,
      toTSV(r.left), toTSV(r.right),
      analysis.phIssues.has(r.key)   ? "Y" : "N",
      analysis.numIssues.has(r.key)  ? "Y" : "N",
      analysis.langIssues.has(r.key) ? "Y" : "N",
    ].join("\t"));
  }
  return out.join("\n");
}

// ── MAIN ──
function hasData() {
  const mode = getMode();
  return mode === "tsv"
    ? !!tsvInput.value.trim()
    : !!(leftText.value.trim() || rightText.value.trim());
}

function analyzeAndRender() {
  buildLangAllowUI();
  const { rows: r } = buildRows();
  rows = r;
  const analysis = analyzeRows(rows);
  updateStats(rows, analysis);
  renderTable(rows, analysis);
  renderLangPanel(analysis);
  renderPHPanel(analysis);
  renderNumPanel(analysis);
}

function syncModeUI() {
  const mode = getMode();
  if (mode === "tsv") {
    blockBox.classList.add("hide");
    tsvBox.style.display = "block";
    inputMeta.textContent = "TSV · 원본 TAB 번역";
  } else {
    blockBox.classList.remove("hide");
    tsvBox.style.display = "none";
    inputMeta.textContent = mode === "multicell"
      ? "멀티셀 · 셀 사이 빈 줄 2개 이상"
      : "단일 · 줄 단위 비교";
  }
  leftCount.textContent = ""; rightCount.textContent = "";
  tbody.innerHTML = `<tr><td colspan="3" class="empty" style="padding:14px 12px">내용을 입력하면 자동으로 분석됩니다.</td></tr>`;
  langBody.innerHTML = `<span class="empty">대상(왼쪽/오른쪽)을 체크하면 탐지를 시작합니다.</span>`;
  phBody.innerHTML   = `<span class="empty">PH 검사를 켜고 분석하면 결과가 표시됩니다.</span>`;
  numBody.innerHTML  = `<span class="empty">숫자 검사를 켜고 분석하면 결과가 표시됩니다.</span>`;
  statTotal.textContent = "행 0"; statPh.textContent = "PH 0";
  statNum.textContent = "NUM 0"; statLang.textContent = "LANG 0";
  phMeta.textContent = "0"; numMeta.textContent = "0"; langMeta.textContent = "0행";
  sumKOR.textContent = "0"; sumTHA.textContent = "0"; sumLAT.textContent = "0";
  rowElByKey.clear(); rows = [];
}

// ── EVENTS ──
analyzeBtn.addEventListener("click", analyzeAndRender);

clearBtn.addEventListener("click", () => {
  leftText.value = ""; rightText.value = ""; tsvInput.value = "";
  syncModeUI();
});

copyBtn.addEventListener("click", async () => {
  const { rows: r } = buildRows();
  const analysis = analyzeRows(r);
  const tsv = buildTSV(r, analysis);
  try {
    await navigator.clipboard.writeText(tsv);
  } catch {
    const ta = document.createElement("textarea");
    ta.value = tsv; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
  }
  copyBtn.textContent = "복사 완료!";
  setTimeout(() => copyBtn.textContent = "TSV 복사", 1200);
});

// Check toggles → re-analyze
[checkPH, checkNum, ignoreEmpty, tsvHeader, scanLeft, scanRight].forEach(el => {
  el.addEventListener("change", () => { if (hasData()) analyzeAndRender(); });
});

// Keyword exclusion → re-analyze
langExcludeInput.addEventListener("input", () => {
  if (hasData() && (scanLeft.checked || scanRight.checked)) analyzeAndRender();
});

// Auto-analyze: input + paste
let autoTimer = null;
function scheduleAnalyze() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { if (hasData()) analyzeAndRender(); }, 400);
}
[leftText, rightText, tsvInput].forEach(el => {
  el.addEventListener("input", scheduleAnalyze);
  el.addEventListener("paste", () => setTimeout(scheduleAnalyze, 10));
});

// Presets
presetAll.addEventListener("click",     () => applyPreset(SCRIPTS.map(s => s.code)));
presetLatTha.addEventListener("click",  () => applyPreset(["LAT","THA"]));
presetLatOnly.addEventListener("click", () => applyPreset(["LAT"]));

// Nav active
const curPage = (location.pathname.split("/").pop() || "").toLowerCase();
document.querySelectorAll('.nav a[data-page]').forEach(a => {
  if ((a.dataset.page || "").toLowerCase() === curPage) a.classList.add("active");
});

// Init
buildLangAllowUI();
syncModeUI();
</script>
</body>
</html>
