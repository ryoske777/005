<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>단어 일치 검수</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: rgba(255,255,255,0.03);
      --surface2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --warn: #ffa657;
      --ok: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 13px; line-height: 1.5;
      display: flex; flex-direction: column;
    }

    /* ── NAV ── */
    .nav {
      flex-shrink: 0;
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; gap: 6px;
      height: 44px; padding: 0 16px;
      background: rgba(13,17,23,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-weight: 900; font-size: 13px; color: var(--text); margin-right: 6px; }
    .nav a {
      text-decoration: none; font-size: 12px; font-weight: 700;
      color: var(--muted); padding: 5px 10px;
      border-radius: 8px; border: 1px solid transparent; transition: .1s;
    }
    .nav a:hover { color: var(--text); background: var(--surface2); }
    .nav a.active { color: var(--accent); border-color: rgba(88,166,255,0.35); background: rgba(88,166,255,0.1); }

    /* ── TOOLBAR ── */
    .toolbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; flex-wrap: wrap;
      background: rgba(255,255,255,0.015);
      border-bottom: 1px solid var(--border);
    }
    .sep { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }

    .btn {
      display: inline-flex; align-items: center;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--text); font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: .1s;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.primary { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #79c0ff; }
    .btn.primary:hover { background: rgba(88,166,255,0.25); }
    .btn.success { background: rgba(63,185,80,0.15); border-color: rgba(63,185,80,0.4); color: #56d364; }
    .btn.success:hover { background: rgba(63,185,80,0.25); }
    .btn[disabled] { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .upload-label { cursor: pointer; }
    .upload-label input[type="file"] { display: none; }

    .mode-group { display: flex; border: 1px solid var(--border2); border-radius: 8px; }
    .mode-group label {
      display: flex; align-items: center;
      padding: 5px 11px; font-size: 12px; font-weight: 700;
      color: var(--muted); cursor: pointer; user-select: none;
      border-right: 1px solid var(--border); transition: .1s;
    }
    .mode-group label:first-child { border-radius: 7px 0 0 7px; }
    .mode-group label:last-child { border-right: 0; border-radius: 0 7px 7px 0; }
    .mode-group label.active { background: rgba(88,166,255,0.12); color: #79c0ff; }
    .mode-group label:not(.active):hover { background: var(--surface2); color: var(--text); }
    .mode-group input[type="radio"] { display: none; }

    .stat {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 8px; border-radius: 999px;
      border: 1px solid var(--border); font-size: 11px; color: var(--muted);
    }
    .dot-w { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); display: inline-block; }
    .dot-m { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; }

    /* Tooltip */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 7px); left: 50%;
      transform: translateX(-50%);
      max-width: 260px; white-space: normal; text-align: left;
      padding: 6px 9px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,14,22,0.97);
      color: rgba(230,237,243,0.92); font-size: 11px; line-height: 1.45;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none; transition: opacity .1s; z-index: 9999;
    }
    [data-tip]:hover::after { opacity: 1; }
    .toolbar [data-tip]::after { bottom: auto; top: calc(100% + 7px); }

    /* ── SETUP ── */
    .setup {
      flex-shrink: 0;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
      display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start;
    }
    .setup.hidden { display: none; }
    .setup-block { display: flex; flex-direction: column; gap: 5px; }
    .setup-lbl { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .4px; }
    select {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border2); border-radius: 8px;
      padding: 5px 9px; font-size: 12px; cursor: pointer;
      min-width: 160px;
    }
    select:focus { outline: none; border-color: var(--accent); }
    select option { background: #161b22; }

    .col-checklist { display: flex; flex-wrap: wrap; gap: 4px; max-width: 720px; }
    .col-chk {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 9px; border-radius: 8px;
      border: 1px solid var(--border); font-size: 11px; font-weight: 700;
      color: var(--muted); cursor: pointer; user-select: none; transition: .1s;
    }
    .col-chk input { display: none; }
    .col-chk.on { border-color: rgba(255,166,87,0.45); background: rgba(255,166,87,0.1); color: var(--warn); }
    .col-chk:not(.on):hover { background: var(--surface2); color: var(--text); }

    .all-toggle {
      font-size: 11px; font-weight: 700; color: var(--accent);
      cursor: pointer; padding: 4px 0; white-space: nowrap;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .all-toggle:hover { color: #79c0ff; }

    /* ── MAIN ── */
    .main {
      flex: 1; overflow: hidden;
      display: grid; grid-template-columns: 380px 1fr;
    }
    @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

    /* PANEL */
    .panel { overflow-y: auto; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; }
    .panel-head {
      position: sticky; top: 0; z-index: 10; flex-shrink: 0;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
      background: rgba(13,17,23,0.97);
      font-size: 12px; font-weight: 800;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-meta { font-size: 11px; color: var(--muted); font-weight: 400; }

    .col-group-head {
      padding: 6px 12px;
      font-size: 11px; font-weight: 800; color: var(--warn);
      background: rgba(255,166,87,0.07);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase; letter-spacing: .4px;
      position: sticky; top: 37px; z-index: 9;
    }
    .issue-item { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .issue-src {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 11px; font-weight: 700; color: var(--text);
      background: rgba(255,255,255,0.06); border: 1px solid var(--border2);
      padding: 2px 7px; border-radius: 5px; display: inline-block;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 5px; vertical-align: middle;
    }
    .var-list { display: flex; flex-direction: column; gap: 3px; }
    .var-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .vbadge {
      font-size: 10px; font-weight: 700; flex-shrink: 0;
      padding: 1px 6px; border-radius: 4px; border: 1px solid;
    }
    .vbadge.first { background: rgba(63,185,80,0.12); border-color: rgba(63,185,80,0.35); color: #56d364; }
    .vbadge.diff  { background: rgba(255,166,87,0.12); border-color: rgba(255,166,87,0.4); color: var(--warn); }
    .var-txt {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 11px; color: var(--text);
      max-width: 155px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0;
    }
    .var-rows { font-size: 10px; color: var(--muted); flex: 1; }
    .jump-btn {
      padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
      background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3);
      color: var(--accent); font-size: 10px; font-weight: 700;
      cursor: pointer; transition: .1s;
    }
    .jump-btn:hover { background: rgba(88,166,255,0.2); }
    .empty-msg { padding: 24px 16px; font-size: 12px; color: var(--muted); display: block; }

    /* TABLE */
    .table-wrap { overflow: auto; }
    table { border-collapse: collapse; font-size: 12px; width: max-content; min-width: 100%; }
    thead th {
      position: sticky; top: 0; z-index: 5;
      padding: 6px 10px; white-space: nowrap;
      background: rgba(22,27,34,0.97);
      border-bottom: 2px solid var(--border2);
      color: var(--muted); font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .3px;
      border-right: 1px solid var(--border);
    }
    thead th.col-src { color: var(--accent); border-bottom-color: rgba(88,166,255,0.5); }
    thead th.col-tgt { color: var(--warn); border-bottom-color: rgba(255,166,87,0.5); }
    tbody td {
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    tbody td.rn {
      color: var(--muted); font-size: 10px; text-align: right;
      min-width: 38px; user-select: none; background: rgba(0,0,0,0.1);
    }
    tbody td.hl-bad  { background: rgba(255,166,87,0.20) !important; color: var(--warn); font-weight: 700; }
    tbody td.hl-first{ background: rgba(63,185,80,0.08); }
    tbody tr.row-issue { background: rgba(255,166,87,0.04); }
    tbody tr:hover td { background: rgba(255,255,255,0.025); }
    tbody tr:hover td.hl-bad  { background: rgba(255,166,87,0.30) !important; }
    tbody tr:hover td.hl-first{ background: rgba(63,185,80,0.14); }
    tr.flash-row td { outline: 2px solid var(--accent); }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <span class="nav-brand">TOOLS</span>
  <a href="review.html"    data-page="review.html">번역 검수</a>
  <a href="strscan.html"   data-page="strscan.html">문자열 탐지</a>
  <a href="placeholder.html" data-page="placeholder.html">플레이스홀더</a>
  <a href="wordcheck.html" data-page="wordcheck.html">단어 일치 검수</a>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <label class="btn upload-label" id="uploadLabel" data-tip="xlsx 엑셀 파일을 업로드합니다">
    엑셀 업로드
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </label>
  <span id="fileNameBadge" style="font-size:11px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>

  <div class="sep"></div>

  <button class="btn primary" id="analyzeBtn" disabled data-tip="선택한 열을 기준으로 번역 일치 여부를 분석합니다">분석</button>
  <button class="btn success" id="downloadBtn" disabled data-tip="불일치 항목이 색상으로 표기된 HTML 파일을 내보냅니다">HTML 내보내기</button>

  <div class="sep"></div>

  <span style="font-size:11px;font-weight:800;color:var(--muted)">비교 방식</span>
  <div class="mode-group">
    <label data-tip="셀 내용 전체를 하나의 단위로 비교합니다">
      <input type="radio" name="mode" value="cell" checked> 셀 전체
    </label>
    <label data-tip="셀 안의 단어를 공백·구분자로 분리하여 단어 단위로 추적합니다">
      <input type="radio" name="mode" value="word"> 개별 단어
    </label>
  </div>

  <div class="sep"></div>

  <span class="stat"><span class="dot-w"></span><span id="statIssue">불일치 0</span></span>
  <span class="stat" id="statRows" style="display:none"><span class="dot-m"></span><span id="statRowsText"></span></span>
</div>

<!-- SETUP (파일 업로드 후 표시) -->
<div class="setup hidden" id="setupArea">
  <div class="setup-block">
    <span class="setup-lbl">원본 열 (기준)</span>
    <select id="srcColSelect"></select>
  </div>
  <div class="setup-block">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:2px">
      <span class="setup-lbl">비교 열 (번역 결과, 복수 선택)</span>
      <span class="all-toggle" id="allToggle">전체 선택</span>
    </div>
    <div class="col-checklist" id="tgtColList"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- PANEL (왼쪽: 불일치 목록) -->
  <div class="panel">
    <div class="panel-head">
      <span>불일치 목록</span>
      <span class="panel-meta" id="panelMeta">분석 전</span>
    </div>
    <div id="panelBody">
      <span class="empty-msg">엑셀 파일을 업로드하고 열을 선택한 뒤 분석하세요.</span>
    </div>
  </div>

  <!-- TABLE (오른쪽: 전체 데이터) -->
  <div class="table-wrap" id="tableWrap">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const $ = id => document.getElementById(id);

// ── STATE ──
let headers   = [];
let dataRows  = [];    // array of arrays
let analysisResult = null;   // Map<tgtColName, {issues, tgtColIdx}>
let badSet    = null;   // Map<rowIdx, Set<colIdx>>  — 불일치 셀
let firstSet  = null;   // Map<rowIdx, Set<colIdx>>  — 최초 번역 셀(불일치 이슈 있는 단어의 기준 행)
let rowElems  = [];     // tr 요소 배열 (rowIdx → tr)

// ── UTILS ──
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function cellStr(v) { return String(v ?? '').trim(); }

// ── FILE UPLOAD ──
$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  loadFile(file);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (!raw.length) { alert('데이터가 없습니다.'); return; }

      const maxCols = Math.max(...raw.map(r => r.length));
      headers = raw[0].map((h, i) => cellStr(h) || `열${i + 1}`);
      while (headers.length < maxCols) headers.push(`열${headers.length + 1}`);

      dataRows = raw.slice(1).map(r => {
        const p = [...r];
        while (p.length < headers.length) p.push('');
        return p;
      });

      $('fileNameBadge').textContent = file.name;
      $('statRows').style.display = '';
      $('statRowsText').textContent = `${dataRows.length}행`;
      $('setupArea').classList.remove('hidden');
      $('analyzeBtn').disabled = false;

      populateColumnSelectors();
      // Reset
      analysisResult = null; badSet = null; firstSet = null; rowElems = [];
      $('panelMeta').textContent = '분석 전';
      $('panelBody').innerHTML = '<span class="empty-msg">열을 선택하고 분석 버튼을 누르세요.</span>';
      $('tableHead').innerHTML = ''; $('tableBody').innerHTML = '';
      $('statIssue').textContent = '불일치 0';
      $('downloadBtn').disabled = true;
    } catch(err) {
      alert('파일을 읽지 못했습니다: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── COLUMN SELECTORS ──
function populateColumnSelectors() {
  const srcSel = $('srcColSelect');
  srcSel.innerHTML = '';
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = h;
    srcSel.appendChild(opt);
  });

  const tgtList = $('tgtColList');
  tgtList.innerHTML = '';
  headers.forEach((h, i) => {
    const label = document.createElement('label');
    label.className = 'col-chk';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.value = i;
    cb.addEventListener('change', () => label.classList.toggle('on', cb.checked));
    label.appendChild(cb);
    label.appendChild(document.createTextNode(h));
    tgtList.appendChild(label);
  });
}

// 전체 선택 / 해제 토글
let allSelected = false;
$('allToggle').addEventListener('click', () => {
  allSelected = !allSelected;
  $('allToggle').textContent = allSelected ? '전체 해제' : '전체 선택';
  $('tgtColList').querySelectorAll('.col-chk').forEach(label => {
    const cb = label.querySelector('input');
    cb.checked = allSelected;
    label.classList.toggle('on', allSelected);
  });
});

function getMode()        { return document.querySelector('input[name="mode"]:checked')?.value ?? 'cell'; }
function getSrcColIdx()   { return parseInt($('srcColSelect').value, 10); }
function getTgtColIdxArr(){ return [...$('tgtColList').querySelectorAll('input:checked')].map(cb => parseInt(cb.value, 10)); }

// ── ANALYSIS ──
function analyzeConsistency(rows, headers, srcColIdx, tgtColIdxArr, mode) {
  const result = new Map();

  for (const tgtColIdx of tgtColIdxArr) {
    const tgtColName = headers[tgtColIdx];
    // tracker: srcKey → { firstTgt, firstRow, variants: Map<tgt, rowIdx[]> }
    const tracker = new Map();

    rows.forEach((row, rowIdx) => {
      const srcCell = cellStr(row[srcColIdx]);
      const tgtCell = cellStr(row[tgtColIdx]);
      if (!srcCell) return;

      let keys;
      if (mode === 'word') {
        // 공백·구분자 기준으로 분리, 2글자 이상 단어만 추적
        keys = [...new Set(
          srcCell.split(/[\s\t\r\n,，、;；·\-\/]+/)
            .map(w => w.replace(/^['"()\[\]{}<>]+|['"()\[\]{}<>]+$/g, '').trim())
            .filter(w => w.length >= 2)
        )];
        if (!keys.length) keys = [srcCell];
      } else {
        keys = [srcCell];
      }

      for (const key of keys) {
        if (!tracker.has(key)) {
          tracker.set(key, {
            firstTgt: tgtCell,
            firstRow: rowIdx,
            variants: new Map([[tgtCell, [rowIdx]]])
          });
        } else {
          const entry = tracker.get(key);
          if (!entry.variants.has(tgtCell)) entry.variants.set(tgtCell, []);
          entry.variants.get(tgtCell).push(rowIdx);
        }
      }
    });

    const issues = [];
    for (const [src, data] of tracker) {
      if (data.variants.size > 1) {
        issues.push({ src, firstTgt: data.firstTgt, firstRow: data.firstRow, variants: data.variants });
      }
    }
    issues.sort((a, b) => String(a.src).localeCompare(String(b.src), 'ko'));
    result.set(tgtColName, { issues, tgtColIdx });
  }
  return result;
}

function buildIssueSets(analysisResult) {
  const bad   = new Map();  // Map<rowIdx, Set<colIdx>>
  const first = new Map();  // Map<rowIdx, Set<colIdx>>

  for (const [, { issues, tgtColIdx }] of analysisResult) {
    for (const issue of issues) {
      for (const [tgt, rowIdxArr] of issue.variants) {
        for (const rowIdx of rowIdxArr) {
          if (tgt !== issue.firstTgt) {
            if (!bad.has(rowIdx)) bad.set(rowIdx, new Set());
            bad.get(rowIdx).add(tgtColIdx);
          } else {
            if (!first.has(rowIdx)) first.set(rowIdx, new Set());
            first.get(rowIdx).add(tgtColIdx);
          }
        }
      }
    }
  }
  return { bad, first };
}

// ── ANALYZE ──
$('analyzeBtn').addEventListener('click', doAnalyze);

function doAnalyze() {
  const srcColIdx    = getSrcColIdx();
  const tgtColIdxArr = getTgtColIdxArr();
  if (!tgtColIdxArr.length) { alert('비교 열을 하나 이상 선택해 주세요.'); return; }

  analysisResult = analyzeConsistency(dataRows, headers, srcColIdx, tgtColIdxArr, getMode());
  const sets = buildIssueSets(analysisResult);
  badSet   = sets.bad;
  firstSet = sets.first;

  let total = 0;
  for (const [, { issues }] of analysisResult) total += issues.length;
  $('statIssue').textContent = `불일치 ${total}`;

  renderTable(srcColIdx, tgtColIdxArr);
  renderPanel();
  $('downloadBtn').disabled = false;
}

// ── TABLE ──
function renderTable(srcColIdx, tgtColIdxArr) {
  const thead = $('tableHead');
  const tbody = $('tableBody');
  const tgtSet = new Set(tgtColIdxArr);
  rowElems = [];

  // 헤더
  const htr = document.createElement('tr');
  const thNo = document.createElement('th'); thNo.textContent = '#'; htr.appendChild(thNo);
  headers.forEach((h, i) => {
    const th = document.createElement('th');
    th.textContent = h;
    if (i === srcColIdx)   th.className = 'col-src';
    else if (tgtSet.has(i)) th.className = 'col-tgt';
    htr.appendChild(th);
  });
  thead.innerHTML = ''; thead.appendChild(htr);

  // 데이터 행 (최대 5000행 DOM 표시)
  const MAX = 5000;
  const frag = document.createDocumentFragment();
  dataRows.slice(0, MAX).forEach((row, rowIdx) => {
    const tr = document.createElement('tr');
    if (badSet.has(rowIdx)) tr.className = 'row-issue';
    tr.dataset.row = rowIdx;

    const tdNo = document.createElement('td');
    tdNo.className = 'rn'; tdNo.textContent = rowIdx + 2;
    tr.appendChild(tdNo);

    row.forEach((val, colIdx) => {
      const td = document.createElement('td');
      td.textContent = cellStr(val);
      if      (badSet.has(rowIdx)   && badSet.get(rowIdx).has(colIdx))   td.className = 'hl-bad';
      else if (firstSet.has(rowIdx) && firstSet.get(rowIdx).has(colIdx)) td.className = 'hl-first';
      tr.appendChild(td);
    });

    frag.appendChild(tr);
    rowElems[rowIdx] = tr;
  });

  tbody.innerHTML = '';
  tbody.appendChild(frag);

  if (dataRows.length > MAX) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = headers.length + 1;
    td.style.cssText = 'text-align:center;color:var(--muted);padding:10px;font-size:11px';
    td.textContent = `표시 한도(${MAX.toLocaleString()}행)를 초과하여 일부만 표시합니다. HTML 내보내기에는 전체 데이터가 포함됩니다.`;
    tr.appendChild(td); tbody.appendChild(tr);
  }
}

// ── PANEL ──
function renderPanel() {
  const body = $('panelBody');
  body.innerHTML = '';

  let total = 0;
  for (const [, { issues }] of analysisResult) total += issues.length;

  if (!total) {
    body.innerHTML = '<span class="empty-msg">불일치 항목이 없습니다 ✓</span>';
    $('panelMeta').textContent = '이상 없음';
    return;
  }
  $('panelMeta').textContent = `${total}개 불일치`;

  for (const [colName, { issues }] of analysisResult) {
    if (!issues.length) continue;

    const grpHead = document.createElement('div');
    grpHead.className = 'col-group-head';
    grpHead.textContent = `${colName}  ·  ${issues.length}개`;
    body.appendChild(grpHead);

    for (const issue of issues) {
      const item = document.createElement('div');
      item.className = 'issue-item';

      const srcEl = document.createElement('div');
      srcEl.className = 'issue-src';
      srcEl.textContent = issue.src; srcEl.title = issue.src;
      item.appendChild(srcEl);

      const varList = document.createElement('div');
      varList.className = 'var-list';

      // 정렬: 최초 번역 먼저
      const sorted = [...issue.variants.entries()].sort((a, b) =>
        a[0] === issue.firstTgt ? -1 : b[0] === issue.firstTgt ? 1 : 0
      );

      for (const [tgt, rowIdxArr] of sorted) {
        const isFirst = tgt === issue.firstTgt;
        const vrow = document.createElement('div');
        vrow.className = 'var-row';

        const badge = document.createElement('span');
        badge.className = `vbadge ${isFirst ? 'first' : 'diff'}`;
        badge.textContent = isFirst ? '최초' : '불일치';

        const txt = document.createElement('span');
        txt.className = 'var-txt';
        txt.textContent = tgt || '(비어있음)'; txt.title = tgt;

        const rowNums = rowIdxArr.slice(0, 6).map(i => i + 2).join(', ');
        const rowsEl = document.createElement('span');
        rowsEl.className = 'var-rows';
        rowsEl.textContent = `행: ${rowNums}${rowIdxArr.length > 6 ? ` +${rowIdxArr.length - 6}` : ''}`;

        const jBtn = document.createElement('button');
        jBtn.className = 'jump-btn'; jBtn.textContent = '이동';
        jBtn.addEventListener('click', () => {
          const tr = rowElems[rowIdxArr[0]];
          if (!tr) return;
          tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
          tr.classList.add('flash-row');
          setTimeout(() => tr.classList.remove('flash-row'), 1400);
        });

        vrow.append(badge, txt, rowsEl, jBtn);
        varList.appendChild(vrow);
      }

      item.appendChild(varList);
      body.appendChild(item);
    }
  }
}

// ── HTML DOWNLOAD ──
$('downloadBtn').addEventListener('click', downloadHTML);

function downloadHTML() {
  if (!analysisResult || !dataRows.length) return;
  const srcColIdx    = getSrcColIdx();
  const tgtColIdxArr = getTgtColIdxArr();
  const tgtSet       = new Set(tgtColIdxArr);

  let totalIssues = 0;
  let summaryHtml = '';

  for (const [colName, { issues }] of analysisResult) {
    if (!issues.length) continue;
    totalIssues += issues.length;
    summaryHtml += `<h3>비교 열: ${escHtml(colName)} — ${issues.length}개 불일치</h3>`;
    summaryHtml += `<table class="sum"><thead><tr>
      <th>원본</th><th>최초 번역 (기준)</th><th>불일치 번역</th><th>해당 행 (Excel 행 번호)</th>
    </tr></thead><tbody>`;
    for (const issue of issues) {
      for (const [tgt, rowIdxArr] of issue.variants) {
        if (tgt === issue.firstTgt) continue;
        const rowNums = rowIdxArr.map(i => i + 2).join(', ');
        summaryHtml += `<tr>
          <td class="mono">${escHtml(issue.src)}</td>
          <td class="c-first">${escHtml(issue.firstTgt || '(비어있음)')}</td>
          <td class="c-bad">${escHtml(tgt || '(비어있음)')}</td>
          <td>${escHtml(rowNums)}</td>
        </tr>`;
      }
    }
    summaryHtml += '</tbody></table>';
  }

  const thCells = ['<th class="th-rn">#</th>',
    ...headers.map((h, i) => {
      const c = i === srcColIdx ? ' class="th-src"' : tgtSet.has(i) ? ' class="th-tgt"' : '';
      return `<th${c}>${escHtml(h)}</th>`;
    })
  ].join('');

  const tbRows = dataRows.map((row, rowIdx) => {
    const hasBad = badSet.has(rowIdx);
    const cells = ['<td class="rn">' + (rowIdx + 2) + '</td>',
      ...row.map((val, colIdx) => {
        const s = escHtml(cellStr(val));
        if      (badSet.has(rowIdx)   && badSet.get(rowIdx).has(colIdx))   return `<td class="c-bad">${s}</td>`;
        else if (firstSet.has(rowIdx) && firstSet.get(rowIdx).has(colIdx)) return `<td class="c-first">${s}</td>`;
        return `<td>${s}</td>`;
      })
    ].join('');
    return `<tr${hasBad ? ' class="r-bad"' : ''}>${cells}</tr>`;
  }).join('\n');

  const html = `<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>단어 일치 검수 결과</title>
<style>
  body { font-family: "Noto Sans KR", system-ui, sans-serif; background:#fff; color:#1a1a1a; padding:20px 28px; }
  h2 { font-size:18px; margin:0 0 12px; color:#111; }
  h3 { font-size:13px; margin:18px 0 5px; color:#b94000; border-left:3px solid #ffa657; padding-left:8px; }
  table { border-collapse:collapse; width:100%; margin-bottom:16px; font-size:12px; }
  th { background:#2c3e50; color:#fff; padding:6px 10px; text-align:left; border:1px solid #1a252f; white-space:nowrap; }
  td { padding:4px 10px; border:1px solid #dde; white-space:nowrap; max-width:360px; overflow:hidden; text-overflow:ellipsis; }
  tr:nth-child(even) { background:#f7f8fa; }
  .c-bad   { background:#ffe0b2 !important; color:#c45300; font-weight:700; }
  .c-first { background:#e8f5e9 !important; color:#2e7d32; }
  .r-bad   { background:#fff8f0 !important; }
  .mono    { font-family:monospace; }
  .th-rn   { width:36px; text-align:right; }
  .th-src  { background:#1a3a5c !important; }
  .th-tgt  { background:#5c3a00 !important; }
  .rn      { color:#888; text-align:right; background:#f0f0f0; width:36px; }
  .sum th  { background:#455a64; }
  hr       { border:0; border-top:2px solid #dde; margin:24px 0; }
</style>
</head>
<body>
<h2>단어 일치 검수 결과</h2>
<p style="color:#555;font-size:12px;margin-bottom:16px">총 불일치: <strong>${totalIssues}개</strong> &nbsp;|&nbsp; 전체 데이터: <strong>${dataRows.length}행</strong></p>
<div>${summaryHtml}</div>
<hr>
<h2>전체 데이터</h2>
<table><thead><tr>${thCells}</tr></thead><tbody>${tbRows}</tbody></table>
</body>
</html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = '단어일치검수_결과.html';
  a.click();
  URL.revokeObjectURL(url);
}

// ── MODE GROUP ──
document.querySelectorAll('.mode-group label').forEach(label => {
  label.addEventListener('click', () => {
    document.querySelectorAll('.mode-group label').forEach(l => l.classList.remove('active'));
    label.classList.add('active');
    const r = label.querySelector('input'); if (r) r.checked = true;
  });
});
const initActive = document.querySelector('.mode-group label:has(input:checked)');
if (initActive) initActive.classList.add('active');

// ── NAV ACTIVE ──
const curPage = (location.pathname.split('/').pop() || '').toLowerCase();
document.querySelectorAll('.nav a[data-page]').forEach(a => {
  if ((a.dataset.page || '').toLowerCase() === curPage) a.classList.add('active');
});
</script>
</body>
</html>
