<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>단어 일치 검수</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --surface: rgba(0,0,0,0.02);
      --surface2: rgba(0,0,0,0.04);
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.14);
      --text: #1a1a2e;
      --muted: #6b7280;
      --accent: #6366f1;
      --warn: #d97706;
      --ok: #16a34a;
      --err: #dc2626;
      --violet: #8b5cf6;
    }

    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: rgba(255,255,255,0.03);
      --surface2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --warn: #ffa657;
      --ok: #3fb950;
      --err: #ff7b72;
      --violet: #c084fc;
    }

    /* Light-mode overrides for hardcoded dark colors */
    .nav {
      background: rgba(255,255,255,0.94);
    }
    [data-theme="dark"] .nav {
      background: rgba(13,17,23,0.94);
    }

    .drop-overlay {
      background: rgba(245,246,250,0.92);
    }
    [data-theme="dark"] .drop-overlay {
      background: rgba(13,17,23,0.92);
    }

    .toolbar {
      background: rgba(0,0,0,0.015);
    }
    [data-theme="dark"] .toolbar {
      background: rgba(255,255,255,0.015);
    }

    .setup {
      background: rgba(0,0,0,0.01);
    }
    [data-theme="dark"] .setup {
      background: rgba(255,255,255,0.01);
    }

    select option {
      background: #ffffff;
    }
    [data-theme="dark"] select option {
      background: #161b22;
    }

    .ms-panel {
      background: rgba(255,255,255,0.99);
    }
    [data-theme="dark"] .ms-panel {
      background: rgba(16,20,28,0.99);
    }

    textarea {
      background: rgba(0,0,0,0.03);
    }
    [data-theme="dark"] textarea {
      background: rgba(0,0,0,0.12);
    }

    .icard-table thead th {
      background: rgba(0,0,0,0.04);
    }
    [data-theme="dark"] .icard-table thead th {
      background: rgba(0,0,0,0.15);
    }

    .icard-table tbody tr {
      border-bottom-color: rgba(0,0,0,0.06);
    }
    [data-theme="dark"] .icard-table tbody tr {
      border-bottom-color: rgba(255,255,255,0.04);
    }

    [data-tip]::after {
      background: rgba(255,255,255,0.97);
      border-color: rgba(0,0,0,0.12);
      color: rgba(30,30,50,0.92);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] [data-tip]::after {
      background: rgba(10,14,22,0.97);
      border-color: rgba(255,255,255,0.12);
      color: rgba(230,237,243,0.92);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    #loadingOverlay {
      background: rgba(245,246,250,0.88);
    }
    [data-theme="dark"] #loadingOverlay {
      background: rgba(13,17,23,0.88);
    }

    .filter-bar {
      background: rgba(0,0,0,0.01);
    }
    [data-theme="dark"] .filter-bar {
      background: rgba(255,255,255,0.01);
    }

    mark.diff-word {
      background: rgba(217,119,6,0.15);
      color: #b45309;
    }
    [data-theme="dark"] mark.diff-word {
      background: rgba(255,166,87,0.22);
      color: #ffc57a;
    }

    /* Theme toggle button */
    .theme-toggle {
      margin-left: auto;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface2);
      cursor: pointer; font-size: 16px; transition: .15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.4); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    .drop-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      background: rgba(13,17,23,0.92);
      border: 3px dashed rgba(88,166,255,0.55);
      margin: 10px; border-radius: 16px;
      pointer-events: none; opacity: 0; transition: opacity .15s;
    }
    .drop-overlay.active { opacity: 1; }
    .drop-overlay-icon { font-size: 40px; }
    .drop-overlay-txt { font-size: 18px; font-weight: 800; color: var(--accent); }

    .nav {
      flex-shrink: 0;
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; gap: 6px;
      height: 44px; padding: 0 16px;
      background: rgba(13,17,23,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-weight: 900; font-size: 13px; color: var(--text); margin-right: 6px; }
    .nav a {
      text-decoration: none; font-size: 12px; font-weight: 700;
      color: var(--muted); padding: 5px 10px;
      border-radius: 8px; border: 1px solid transparent; transition: .1s;
    }
    .nav a:hover { color: var(--text); background: var(--surface2); }
    .nav a.active { color: var(--accent); border-color: rgba(88,166,255,0.35); background: rgba(88,166,255,0.1); }

    .toolbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; flex-wrap: wrap;
      background: rgba(255,255,255,0.015);
      border-bottom: 1px solid var(--border);
    }
    .sep { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }

    .btn {
      display: inline-flex; align-items: center;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--text); font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: .1s;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.success { background: rgba(63,185,80,0.15); border-color: rgba(63,185,80,0.4); color: #56d364; }
    .btn.success:hover { background: rgba(63,185,80,0.25); }
    .btn[disabled] { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .upload-label { cursor: pointer; }
    .upload-label input[type="file"] { display: none; }

    .mode-group { display: flex; border: 1px solid var(--border2); border-radius: 8px; }
    .mode-group label {
      display: flex; align-items: center;
      padding: 5px 11px; font-size: 12px; font-weight: 700;
      color: var(--muted); cursor: pointer; user-select: none;
      border-right: 1px solid var(--border); transition: .1s;
    }
    .mode-group label:first-child { border-radius: 7px 0 0 7px; }
    .mode-group label:last-child { border-right: 0; border-radius: 0 7px 7px 0; }
    .mode-group label.active { background: rgba(88,166,255,0.12); color: #79c0ff; }
    .mode-group label:not(.active):hover { background: var(--surface2); color: var(--text); }
    .mode-group input[type="radio"] { display: none; }

    .stat {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 8px; border-radius: 999px;
      border: 1px solid var(--border); font-size: 11px; color: var(--muted);
    }
    .dot-w { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); display: inline-block; }
    .dot-m { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; }

    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 7px); left: 0;
      transform: none;
      width: max-content; min-width: 220px; max-width: 320px;
      white-space: normal; text-align: left; word-break: keep-all;
      padding: 8px 11px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,14,22,0.97);
      color: rgba(230,237,243,0.92); font-size: 11.5px; line-height: 1.6;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none; transition: opacity .1s; z-index: 9999;
    }
    [data-tip]:hover::after { opacity: 1; }
    .toolbar [data-tip]::after { bottom: auto; top: calc(100% + 7px); left: 0; }
    .filter-bar [data-tip]::after { bottom: auto; top: calc(100% + 7px); left: 0; }

    .setup {
      flex-shrink: 0;
      display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }
    .setup.hidden { display: none; }
    .setup-item { display: flex; flex-direction: column; gap: 4px; }
    .setup-lbl { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .4px; }
    .setup-note { font-size: 10px; color: var(--muted); }

    select {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border2); border-radius: 8px;
      padding: 5px 9px; font-size: 12px; cursor: pointer;
      min-width: 160px;
    }
    select:focus { outline: none; border-color: var(--accent); }
    select option { background: #161b22; }

    .ms-wrap { position: relative; }
    .ms-btn {
      display: inline-flex; align-items: center; justify-content: space-between; gap: 8px;
      min-width: 240px; padding: 5px 9px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border2); border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: .1s;
      white-space: nowrap;
    }
    .ms-btn:hover { background: rgba(255,255,255,0.1); }
    .ms-btn.open { border-color: rgba(255,166,87,0.5); background: rgba(255,166,87,0.07); }
    .ms-btn .ms-arrow { font-size: 9px; color: var(--muted); transition: transform .15s; }
    .ms-btn.open .ms-arrow { transform: rotate(180deg); }
    .ms-btn .ms-label { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; }

    .ms-panel {
      position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
      min-width: 270px; max-height: 320px; overflow-y: auto;
      background: rgba(16,20,28,0.99); border: 1px solid var(--border2);
      border-radius: 10px; padding: 4px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      display: none;
    }
    .ms-panel.open { display: block; }
    .ms-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 8px 7px; border-bottom: 1px solid var(--border); margin-bottom: 3px;
    }
    .ms-header-txt { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .ms-all-btn { font-size: 11px; font-weight: 700; color: var(--accent); cursor: pointer; }
    .ms-all-btn:hover { color: #79c0ff; }
    .ms-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      font-size: 12px; color: var(--muted); transition: .1s;
    }
    .ms-item:hover { background: var(--surface2); color: var(--text); }
    .ms-item.on { color: var(--warn); }
    .ms-item.disabled {
      opacity: .35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .ms-check {
      width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 900;
    }
    .ms-item.on .ms-check {
      background: rgba(255,166,87,0.25);
      border-color: rgba(255,166,87,0.6);
      color: var(--warn);
    }

    .btn.analyze {
      background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #79c0ff;
      padding: 6px 18px; font-size: 13px;
    }
    .btn.analyze:hover { background: rgba(88,166,255,0.25); }

    .content {
      flex: 1; overflow-y: auto;
      padding: 14px 16px 40px;
    }

    .content-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 60px 20px;
      color: var(--muted); font-size: 13px; text-align: center;
    }
    .content-empty .ci-icon { font-size: 40px; opacity: .5; margin-bottom: 4px; }
    .content-empty .ci-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .content-empty .ci-desc { font-size: 13px; color: var(--muted); line-height: 1.7; }

    .summary-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding-bottom: 12px;
    }
    .s-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      border: 1px solid rgba(255,166,87,0.3);
      background: rgba(255,166,87,0.08); color: var(--warn);
    }
    .s-chip.ok { border-color: rgba(63,185,80,0.3); background: rgba(63,185,80,0.08); color: #56d364; }
    .s-chip.info { border-color: rgba(88,166,255,0.3); background: rgba(88,166,255,0.08); color: var(--accent); }
    .s-chip.violet { border-color: rgba(192,132,252,0.35); background: rgba(192,132,252,0.08); color: var(--violet); }

    .issue-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 12px; overflow: hidden;
    }
    .icard-head {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 9px 14px;
      background: rgba(255,166,87,0.06);
      border-bottom: 1px solid var(--border);
    }
    .icard-colname { font-size: 12px; font-weight: 800; color: var(--warn); }
    .icard-count { font-size: 11px; color: var(--muted); }
    .icard-ok { font-size: 12px; font-weight: 700; color: #56d364; }

    .icard-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .icard-table thead th {
      padding: 7px 14px; text-align: left;
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .3px;
      color: var(--muted); background: rgba(0,0,0,0.15);
      border-bottom: 1px solid var(--border);
    }
    .icard-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
    .icard-table tbody tr:last-child { border-bottom: 0; }
    .icard-table td {
      padding: 7px 14px; vertical-align: top;
      word-break: break-word;
    }

    .td-kind { width: 120px; }
    .td-cat { width: 96px; color: #a5d6ff; font-weight: 700; }
    .td-pri { width: 56px; color: var(--muted); font-weight: 700; }
    .td-src {
      font-family: ui-monospace, Consolas, monospace;
      font-weight: 700; color: var(--text);
      width: 230px;
    }
    .td-first {
      color: #56d364; font-weight: 700;
      width: 220px;
    }
    .td-bad { color: var(--warn); font-weight: 700; }
    .td-note { color: var(--muted); font-size: 11px; margin-top: 3px; }
    .td-rows { width: 170px; color: var(--muted); font-size: 11px; }

    .badge-first,
    .badge-bad,
    .badge-kind {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 4px; margin-right: 4px;
    }
    .badge-first {
      background: rgba(63,185,80,0.12);
      border: 1px solid rgba(63,185,80,0.35);
      color: #56d364;
    }
    .badge-bad {
      background: rgba(255,166,87,0.12);
      border: 1px solid rgba(255,166,87,0.4);
      color: var(--warn);
    }
    .badge-kind.full {
      background: rgba(88,166,255,0.12);
      border: 1px solid rgba(88,166,255,0.35);
      color: #79c0ff;
    }
    .badge-kind.base {
      background: rgba(192,132,252,0.12);
      border: 1px solid rgba(192,132,252,0.35);
      color: var(--violet);
    }
    .badge-kind.sentence {
      background: rgba(255,123,114,0.12);
      border: 1px solid rgba(255,123,114,0.35);
      color: #ff9b95;
    }
    .badge-kind.cross {
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.35);
      color: #ff6b6b;
    }

    .s-chip.cross {
      border-color: rgba(255,80,80,0.3);
      background: rgba(255,80,80,0.08);
      color: #ff6b6b;
    }

    mark.diff-word {
      background: rgba(255,166,87,0.22);
      border-radius: 3px;
      padding: 0 2px;
      color: #ffc57a;
      font-style: normal;
    }

    .filter-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }
    .filter-btn {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 6px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--muted); font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: .1s; user-select: none;
    }
    .filter-btn:hover { background: var(--surface2); color: var(--text); }
    .filter-btn.f-active { background: rgba(88,166,255,0.12); border-color: rgba(88,166,255,0.4); color: #79c0ff; }
    .filter-btn[data-ftype="crossPriority"].f-active { background: rgba(255,80,80,0.12); border-color: rgba(255,80,80,0.35); color: #ff6b6b; }
    .filter-btn[data-ftype="base"].f-active { background: rgba(192,132,252,0.12); border-color: rgba(192,132,252,0.35); color: var(--violet); }
    .filter-btn[data-ftype="full"].f-active { background: rgba(88,166,255,0.12); border-color: rgba(88,166,255,0.4); color: #79c0ff; }
    .filter-btn[data-ftype="sentence"].f-active { background: rgba(255,123,114,0.12); border-color: rgba(255,123,114,0.35); color: #ff9b95; }

    .icard-head { cursor: pointer; }
    .icard-toggle { font-size: 9px; color: var(--muted); margin-left: auto; transition: transform .2s; flex-shrink: 0; }
    .icard-head.collapsed .icard-toggle { transform: rotate(180deg); }
    .icard-body.collapsed { display: none; }

    /* Loading overlay */
    #loadingOverlay {
      position: fixed; inset: 0; z-index: 9998;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(8px);
    }
    .loading-ring { position: relative; width: 120px; height: 120px; }
    .ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 10; }
    .ring-fill {
      fill: none; stroke: var(--accent); stroke-width: 10;
      stroke-dasharray: 314.16; stroke-dashoffset: 314.16;
      transform-origin: 60px 60px; transform: rotate(-90deg);
      transition: stroke-dashoffset 0.22s ease;
    }
    .ring-percent {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px; font-weight: 900; color: var(--text);
    }
    .loading-label { font-size: 13px; color: var(--muted); }

    /* Auto-detect badge */
    .setup-auto-badge {
      display: inline-flex; align-items: center;
      font-size: 9.5px; font-weight: 700; color: var(--ok);
      background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3);
      border-radius: 4px; padding: 1px 5px; white-space: nowrap;
      vertical-align: middle; margin-left: 4px; letter-spacing: 0;
    }
    .setup-auto-badge.manual {
      color: var(--muted);
      background: rgba(125,133,144,0.1); border-color: rgba(125,133,144,0.3);
    }
  </style>
</head>
<body>

<div class="drop-overlay" id="dropOverlay">
  <div class="drop-overlay-icon">📂</div>
  <div class="drop-overlay-txt">xlsx / xls 파일을 여기에 놓으세요</div>
</div>

<div id="loadingOverlay">
  <div class="loading-ring">
    <svg viewBox="0 0 120 120" width="120" height="120">
      <circle class="ring-bg" cx="60" cy="60" r="50"/>
      <circle id="ringProgress" class="ring-fill" cx="60" cy="60" r="50"/>
    </svg>
    <div id="ringPercent" class="ring-percent">0%</div>
  </div>
  <div class="loading-label">파일 분석 중...</div>
</div>

<nav class="nav">
  <span class="nav-brand">TOOLS</span>
  <a href="review.html" data-page="review.html">번역 검수</a>
  <a href="strscan.html" data-page="strscan.html">문자열 탐지</a>
  <a href="placeholder.html" data-page="placeholder.html">플레이스홀더</a>
  <a href="wordcheck.html" data-page="wordcheck.html">단어 일치 검수</a>
  <button class="theme-toggle" id="themeToggle" title="다크 모드 전환">☀️</button>
</nav>

<div class="toolbar">
  <label class="btn upload-label" id="uploadLabel" data-tip="클릭하거나 파일을 드래그해서 업로드">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
<script>
const $ = id => document.getElementById(id);

let headers = [];
let dataRows = [];
let workbook = null;       // XLSX workbook object
let analysisResult = null; // Map<tgtColName, { issues, tgtColIdx, summary }>
let badSet = null;         // Map<rowIdx, Set<tgtColIdx>>
let resultMap = null;      // Map<rowIdx, Map<tgtColIdx, string[]>>

const PRIORITY_HEADER_HINTS = [/^우선순위$/, /^priority$/i, /우선순위/];
const CATEGORY_HEADER_HINTS = [/^분류$/, /^category$/i, /^match_type$/i, /분류/];
const ISSUE_TYPE_ORDER = { crossPriority: 0, base: 1, full: 2, sentence: 3 };

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function cellStr(v) {
  return String(v ?? '').trim();
}

function safeLocale(a, b) {
  return String(a ?? '').localeCompare(String(b ?? ''), 'ko');
}

function uniq(arr) {
  return [...new Set(arr)];
}

function detectHeaderIndex(hints) {
  for (const re of hints) {
    for (let i = 0; i < headers.length; i++) {
      if (re.test(cellStr(headers[i]))) return i;
    }
  }
  return -1;
}

function parsePriorityCell(v) {
  const s = String(v ?? '').trim();
  if (/^1$/.test(s)) return 1;
  if (/^2$/.test(s)) return 2;
  if (/^3$/.test(s)) return 3;
  return null;
}

function normalizeCategoryValue(v) {
  const s = String(v ?? '').trim().toLowerCase();
  return s || '__all__';
}

function formatCategory(cat) {
  return cat && cat !== '__all__' ? cat : '미분류';
}

function normalizeComparableText(s) {
  let t = String(s ?? '').normalize('NFKC').trim();
  if (!t) return '';
  t = t
    .replace(/\u00A0/g, ' ')
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/[（]/g, '(').replace(/[）]/g, ')')
    .replace(/[［]/g, '[').replace(/[］]/g, ']')
    .replace(/[｛]/g, '{').replace(/[｝]/g, '}')
    .replace(/[‐-‒–—―]/g, '-')
    .replace(/\s+/g, ' ')
    .trim();
  if (/[A-Za-z]/.test(t)) t = t.toLowerCase();
  return t;
}

function normalizeContainText(s) {
  return normalizeComparableText(s).replace(/\s+/g, '');
}

function normalizeSourceKey(s) {
  return normalizeComparableText(s);
}

function stripTrailingBracketInfoDisplay(s) {
  let t = cellStr(s);
  if (!t) return '';
  let prev = null;
  while (t && t !== prev) {
    prev = t;
    t = t.replace(/\s*[\(\[\{（［｛][^()\[\]{}（）［］｛｝]{0,80}[\)\]\}）］｝]\s*$/u, '').trim();
  }
  return t;
}

function extractBaseInfo(sourceText) {
  const raw = cellStr(sourceText);
  if (!raw) {
    return {
      fullText: '',
      fullNorm: '',
      baseText: '',
      baseNorm: '',
      variantText: '',
      hasVariant: false,
      sourceContainKey: ''
    };
  }

  const m = raw.match(/^(.*?)(?:\s*[\(\[\{（［｛]\s*(.*?)\s*[\)\]\}）］｝])?\s*$/u);
  let baseText = raw;
  let variantText = '';

  if (m) {
    baseText = cellStr(m[1]) || raw;
    variantText = cellStr(m[2]);
  }

  return {
    fullText: raw,
    fullNorm: normalizeSourceKey(raw),
    baseText,
    baseNorm: normalizeSourceKey(baseText),
    variantText,
    hasVariant: !!variantText,
    sourceContainKey: normalizeContainText(raw)
  };
}

function buildFamilyKey(normText) {
  const t = normalizeComparableText(normText);
  if (!t) return '__EMPTY__';

  if (/\s/.test(t)) {
    if (/[A-Za-z]/.test(t)) {
      // 라틴 포함 + 공백: 첫 2 토큰으로 그룹화
      const tokens = t.split(/\s+/).filter(Boolean).slice(0, 2);
      return tokens.join(' ');
    } else {
      // CJK 등 비라틴 + 공백: 첫 단어(공백 이전)를 family key로 사용
      // 예) "坚固的 瓦东" → "坚固的", "坚固的 小恶魔" → "坚固的" (같은 패밀리)
      return t.split(/\s+/)[0] || t;
    }
  }

  const compact = t.replace(/\s+/g, '');
  if (!compact) return '__EMPTY__';
  return compact.slice(0, Math.min(4, compact.length));
}

function parseTargetCell(v) {
  const rawText = cellStr(v);
  const fullNorm = normalizeComparableText(rawText);
  const strippedDisplay = stripTrailingBracketInfoDisplay(rawText) || rawText;
  const strippedNorm = normalizeComparableText(strippedDisplay);
  const containNorm = normalizeContainText(rawText);
  const familyKey = buildFamilyKey(strippedNorm || fullNorm);

  return {
    rawText,
    fullNorm,
    strippedDisplay,
    strippedNorm,
    containNorm,
    familyKey
  };
}

function getTokenMatchMode() {
  const el = document.querySelector('input[name="tokenMatch"]:checked');
  return el ? el.value : 'unordered';
}

function containsComparable(sentenceNorm, termNorm) {
  if (!sentenceNorm || !termNorm) return false;

  if (/[a-z]/i.test(termNorm)) {
    const sTokens = sentenceNorm.split(/\s+/).filter(Boolean);
    const tTokens = termNorm.split(/\s+/).filter(Boolean);
    if (!tTokens.length) return false;

    if (getTokenMatchMode() === 'ordered') {
      // 순서 유지: 토큰이 같은 순서로 나타나야 함 (subsequence)
      let si = 0;
      for (const t of tTokens) {
        while (si < sTokens.length && sTokens[si] !== t) si++;
        if (si >= sTokens.length) return false;
        si++;
      }
      return true;
    } else {
      // 순서 무관: 모든 토큰이 어딘가에 포함되면 OK (set containment)
      const sSet = new Set(sTokens);
      return tTokens.every(t => sSet.has(t));
    }
  }
  return sentenceNorm.includes(termNorm);
}

function termContainedIn(termNorm, containerNorm) {
  if (!termNorm || !containerNorm) return false;
  if (/[a-z]/i.test(termNorm)) {
    const cTokens = containerNorm.split(/\s+/).filter(Boolean);
    const cSet = new Set(cTokens);
    return termNorm.split(/\s+/).filter(Boolean).every(t => {
      if (cSet.has(t)) return true;
      // 하이픈 복합어(Mönch-Klasse) 또는 소유격(Jaycee's) 처리
      return cTokens.some(ct => {
        if (!ct.startsWith(t) || ct.length === t.length) return false;
        const next = ct[t.length];
        return next === '-' || next === "'" || next === '\u2019' || next === '.';
      });
    });
  }
  const termC = termNorm.replace(/\s+/g, '');
  const contC = containerNorm.replace(/\s+/g, '');
  return termC.length > 0 && contC.includes(termC);
}

function diffWordsHtml(referenceStr, problemStr) {
  if (!problemStr) return '<em style="color:var(--muted)">(비어있음)</em>';
  if (!referenceStr) return escHtml(problemStr);
  const refSet = new Set(referenceStr.toLowerCase().split(/\s+/).filter(Boolean));
  return problemStr.split(/(\s+)/).map(part => {
    if (!part.trim()) return escHtml(part);
    return refSet.has(part.toLowerCase())
      ? escHtml(part)
      : `<mark class="diff-word">${escHtml(part)}</mark>`;
  }).join('');
}

function addRowMessage(rowMap, rowIdx, message) {
  if (!rowMap.has(rowIdx)) rowMap.set(rowIdx, []);
  rowMap.get(rowIdx).push(message);
}

function mergeColRowMessages(globalRowMap, colRowMessages, tgtColIdx) {
  for (const [rowIdx, msgs] of colRowMessages) {
    if (!globalRowMap.has(rowIdx)) globalRowMap.set(rowIdx, new Map());
    if (!globalRowMap.get(rowIdx).has(tgtColIdx)) globalRowMap.get(rowIdx).set(tgtColIdx, []);
    globalRowMap.get(rowIdx).get(tgtColIdx).push(...msgs);
  }
}

function mergeBadRows(globalBad, rowIdxSet, tgtColIdx) {
  for (const rowIdx of rowIdxSet) {
    if (!globalBad.has(rowIdx)) globalBad.set(rowIdx, new Set());
    globalBad.get(rowIdx).add(tgtColIdx);
  }
}

function pickDominantFromCounter(counterMap) {
  const arr = [...counterMap.entries()].map(([key, obj]) => ({ key, ...obj }));
  arr.sort((a, b) =>
    (b.count - a.count) ||
    (a.firstOrder - b.firstOrder) ||
    safeLocale(a.display, b.display)
  );
  return arr;
}

function longestCommonPrefix(arr) {
  if (!arr.length) return '';
  let prefix = arr[0] || '';
  for (let i = 1; i < arr.length; i++) {
    const cur = arr[i] || '';
    while (prefix && !cur.startsWith(prefix)) {
      prefix = prefix.slice(0, -1);
    }
    if (!prefix) break;
  }
  return prefix;
}

function cleanupPrefix(prefix, referenceList) {
  let p = String(prefix || '').trim();
  if (!p) return '';

  p = p.replace(/[\s\-–—_:|/\\,.;·•]+$/u, '').trim();
  p = p.replace(/[\(\[\{]+$/u, '').trim();

  if (!p) return '';

  if (/[A-Za-z]/.test(p)) {
    const exact = referenceList.some(v => v === p);
    if (!exact && !/[ \-–—_:|/\\]$/.test(prefix)) {
      p = p.replace(/\S+$/u, '').trim();
    }
  }

  return p.trim();
}

function isUsefulBasePrefix(prefix) {
  const p = String(prefix || '').trim();
  if (!p) return false;
  const compact = p.replace(/\s+/g, '');
  if (/[A-Za-z]/.test(p)) {
    if (p.includes(' ')) return compact.length >= 4;
    return compact.length >= 6;
  }
  return compact.length >= 2;
}

function formatRowsExcel(rowIdxArr) {
  const nums = rowIdxArr.slice(0, 12).map(i => i + 2).join(', ');
  return nums + (rowIdxArr.length > 12 ? ` 외 ${rowIdxArr.length - 12}건` : '');
}

function getMode() {
  return document.querySelector('input[name="mode"]:checked')?.value ?? 'auto';
}

function getOptionalColIdx(selectId) {
  const v = $(selectId).value;
  return v === '' ? -1 : parseInt(v, 10);
}

function getSrcColIdx() {
  return parseInt($('srcColSelect').value, 10);
}

function getExcludedColIdxSet() {
  const set = new Set();
  const srcIdx = getSrcColIdx();
  const priIdx = getOptionalColIdx('priorityColSelect');
  const catIdx = getOptionalColIdx('categoryColSelect');
  if (srcIdx >= 0) set.add(srcIdx);
  if (priIdx >= 0) set.add(priIdx);
  if (catIdx >= 0) set.add(catIdx);
  return set;
}

function getTgtColIdxArr() {
  const val = $('tgtColSelect').value;
  if (!val) return [];
  const idx = parseInt(val, 10);
  if (isNaN(idx)) return [];
  const excluded = getExcludedColIdxSet();
  if (excluded.has(idx)) return [];
  return [idx];
}

function prepareRows(rows, srcColIdx, priorityColIdx, categoryColIdx, tgtColIdxArr) {
  return rows.map((row, rowIdx) => {
    const sourceInfo = extractBaseInfo(row[srcColIdx]);
    const priority = priorityColIdx >= 0 ? (parsePriorityCell(row[priorityColIdx]) || 1) : 1;
    const category = categoryColIdx >= 0 ? normalizeCategoryValue(row[categoryColIdx]) : '__all__';

    const targetMap = new Map();
    for (const tgtColIdx of tgtColIdxArr) {
      targetMap.set(tgtColIdx, parseTargetCell(row[tgtColIdx]));
    }

    return {
      rowIdx,
      excelRow: rowIdx + 2,
      rawRow: row,
      category,
      priority,
      sourceText: sourceInfo.fullText,
      sourceNorm: sourceInfo.fullNorm,
      sourceContainKey: sourceInfo.sourceContainKey,
      baseText: sourceInfo.baseText,
      baseNorm: sourceInfo.baseNorm,
      variantText: sourceInfo.variantText,
      hasVariant: sourceInfo.hasVariant,
      targets: targetMap
    };
  });
}

function buildStaticGroups(preparedRows) {
  const fullGroups = new Map();
  const baseGroups = new Map();

  for (const row of preparedRows) {
    if (!row.sourceText) continue;

    const fullKey = `${row.category}||${row.priority}||${row.sourceNorm}`;
    if (!fullGroups.has(fullKey)) {
      fullGroups.set(fullKey, {
        key: fullKey,
        category: row.category,
        priority: row.priority,
        sourceText: row.sourceText,
        sourceNorm: row.sourceNorm,
        baseText: row.baseText,
        rows: []
      });
    }
    fullGroups.get(fullKey).rows.push(row.rowIdx);

    if (row.baseNorm) {
      const baseKey = `${row.category}||${row.priority}||${row.baseNorm}`;
      if (!baseGroups.has(baseKey)) {
        baseGroups.set(baseKey, {
          key: baseKey,
          category: row.category,
          priority: row.priority,
          baseText: row.baseText,
          baseNorm: row.baseNorm,
          rows: [],
          fullSet: new Set(),
          hasVariant: false
        });
      }
      const group = baseGroups.get(baseKey);
      group.rows.push(row.rowIdx);
      group.fullSet.add(row.sourceNorm);
      if (row.hasVariant) group.hasVariant = true;
    }
  }

  return { fullGroups, baseGroups };
}

function analyzeFullGroups(preparedRows, fullGroups, tgtColIdx, includePriority3, rowMessages, badRows) {
  const issues = [];

  for (const group of fullGroups.values()) {
    if (!includePriority3 && group.priority === 3) continue;
    if (group.rows.length < 2) continue;

    const counter = new Map();
    for (const rowIdx of group.rows) {
      const t = preparedRows[rowIdx].targets.get(tgtColIdx);
      const key = t.fullNorm || '__EMPTY__';
      if (!counter.has(key)) {
        counter.set(key, {
          count: 0,
          firstOrder: rowIdx,
          display: t.rawText || '(비어있음)',
          rows: []
        });
      }
      const entry = counter.get(key);
      entry.count++;
      entry.rows.push(rowIdx);
    }

    if (counter.size <= 1) continue;

    const ranked = pickDominantFromCounter(counter);
    const dominant = ranked[0];
    const second = ranked[1];
    const tie = !!second && second.count === dominant.count;

    for (let i = 1; i < ranked.length; i++) {
      const bad = ranked[i];
      issues.push({
        type: 'full',
        typeLabel: '전체 원문',
        category: group.category,
        priority: group.priority,
        basisText: group.sourceText,
        representativeText: dominant.display,
        problemText: bad.display,
        note: tie ? '동률 발생 · 대표 번역은 최초 행 우선' : '',
        rows: [...bad.rows]
      });

      for (const rowIdx of bad.rows) {
        badRows.add(rowIdx);
        addRowMessage(
          rowMessages,
          rowIdx,
          `전체원문 불일치 [${formatCategory(group.category)}/P${group.priority}/${group.sourceText}] 대표: ${dominant.display} | 현재: ${bad.display}`
        );
      }
    }
  }

  return issues;
}

function analyzeBaseGroups(preparedRows, baseGroups, tgtColIdx, hasPriorityColumn, rowMessages, badRows) {
  const issues = [];

  for (const group of baseGroups.values()) {
    const shouldRun = hasPriorityColumn ? group.priority === 2 : true;
    if (!shouldRun) continue;
    if (group.rows.length < 2) continue;
    if (group.fullSet.size < 2 && !group.hasVariant) continue;

    const items = group.rows.map(rowIdx => ({
      rowIdx,
      row: preparedRows[rowIdx],
      t: preparedRows[rowIdx].targets.get(tgtColIdx)
    }));

    const validItems = items.filter(item => item.t.rawText);
    if (validItems.length < 2) continue;

    const familyCounter = new Map();
    for (const item of validItems) {
      const key = item.t.familyKey || '__EMPTY__';
      if (!familyCounter.has(key)) {
        familyCounter.set(key, {
          count: 0,
          firstOrder: item.rowIdx,
          display: item.t.strippedDisplay || item.t.rawText || '(비어있음)',
          rows: []
        });
      }
      const entry = familyCounter.get(key);
      entry.count++;
      entry.rows.push(item.rowIdx);
    }

    const rankedFamily = pickDominantFromCounter(familyCounter);
    if (!rankedFamily.length) continue;

    const dominantFamily = rankedFamily[0];
    const secondFamily = rankedFamily[1];

    if (dominantFamily.key === '__EMPTY__') continue;
    if (dominantFamily.count < 2) continue;
    if (secondFamily && dominantFamily.count <= secondFamily.count) continue;

    const dominantItems = validItems.filter(item => item.t.familyKey === dominantFamily.key);
    let dominantBaseNorm = '';
    const candidateNorms = dominantItems
      .map(item => item.t.strippedNorm || item.t.fullNorm)
      .filter(Boolean);

    if (candidateNorms.length) {
      dominantBaseNorm = cleanupPrefix(longestCommonPrefix(candidateNorms), candidateNorms);
      if (!isUsefulBasePrefix(dominantBaseNorm)) {
        const tempCounter = new Map();
        for (const value of candidateNorms) {
          if (!tempCounter.has(value)) tempCounter.set(value, { count: 0, firstOrder: 999999, display: value });
          tempCounter.get(value).count++;
        }
        const picked = [...tempCounter.entries()]
          .map(([key, obj]) => ({ key, ...obj }))
          .sort((a, b) => (b.count - a.count) || safeLocale(a.key, b.key))[0];
        dominantBaseNorm = picked ? picked.key : '';
      }
    }

    if (!dominantBaseNorm) {
      dominantBaseNorm = dominantFamily.display || '';
    }

    const representativeText = dominantBaseNorm || dominantFamily.display || '(비어있음)';
    const bucketMap = new Map();

    for (const item of items) {
      const normToCheck = item.t.strippedNorm || item.t.fullNorm;
      const followsRepresentative = normToCheck && representativeText && normToCheck.startsWith(representativeText);
      const sameFamily = item.t.familyKey === dominantFamily.key;
      const isEmpty = !item.t.rawText;

      let isIssue = false;
      if (isEmpty) {
        isIssue = true;
      } else if (!(sameFamily && followsRepresentative)) {
        isIssue = true;
      }

      if (!isIssue) continue;

      const problemKey = item.t.fullNorm || '__EMPTY__';
      const display = item.t.strippedDisplay || item.t.rawText || '(비어있음)';
      if (!bucketMap.has(problemKey)) {
        bucketMap.set(problemKey, {
          display,
          rows: []
        });
      }
      bucketMap.get(problemKey).rows.push(item.rowIdx);
    }

    if (!bucketMap.size) continue;

    for (const [, bucket] of bucketMap) {
      issues.push({
        type: 'base',
        typeLabel: '대표어(base)',
        category: group.category,
        priority: group.priority,
        basisText: group.baseText,
        representativeText,
        problemText: bucket.display,
        note: `대표 ${dominantFamily.count}/${validItems.length}행 · 파생 원문 ${group.fullSet.size}종`,
        rows: [...bucket.rows]
      });

      for (const rowIdx of bucket.rows) {
        badRows.add(rowIdx);
        addRowMessage(
          rowMessages,
          rowIdx,
          `대표어(base) 불일치 [${formatCategory(group.category)}/P${group.priority}/base=${group.baseText}] 대표 베이스: ${representativeText} | 현재: ${bucket.display}`
        );
      }
    }
  }

  return issues;
}

function analyzeCrossPriorityCheck(preparedRows, fullGroups, tgtColIdx, rowMessages, badRows) {
  const issues = [];

  // 카테고리별 P1 그룹 목록 구성 (접두어 매칭용)
  const p1ByCategory = new Map();
  for (const [, group] of fullGroups) {
    if (group.priority !== 1 || !group.sourceNorm) continue;
    if (!p1ByCategory.has(group.category)) p1ByCategory.set(group.category, []);
    p1ByCategory.get(group.category).push(group);
  }
  if (!p1ByCategory.size) return issues;

  // P1 대표 번역 캐시
  const domCache = new Map();
  function getP1Dom(group) {
    if (domCache.has(group.key)) return domCache.get(group.key);
    const counter = new Map();
    for (const rowIdx of group.rows) {
      const t = preparedRows[rowIdx]?.targets.get(tgtColIdx);
      const k = t?.fullNorm || '__EMPTY__';
      if (!counter.has(k)) counter.set(k, { count: 0, firstOrder: rowIdx, display: t?.rawText || '', norm: t?.fullNorm || '' });
      counter.get(k).count++;
    }
    const ranked = pickDominantFromCounter(counter);
    const dom = (ranked.length && ranked[0].norm) ? {
      display: ranked[0].display,
      norm: ranked[0].norm,
      dominantCount: ranked[0].count,
      totalCount: group.rows.length
    } : null;
    domCache.set(group.key, dom);
    return dom;
  }

  // P2 행 → 대응 P1 그룹 캐시 (같은 카테고리 내에서 최장 접두어 매칭)
  const matchCache = new Map();

  for (const row of preparedRows) {
    if (row.priority !== 2 || !row.sourceNorm) continue;

    const cacheKey = `${row.category}||${row.sourceNorm}`;
    let p1Group;
    if (matchCache.has(cacheKey)) {
      p1Group = matchCache.get(cacheKey);
    } else {
      // P2 소스가 P1 소스를 접두어로 포함하고, P1보다 길어야 함 (동일하면 별개 맥락 번역)
      const list = p1ByCategory.get(row.category) || [];
      p1Group = null;
      for (const g of list) {
        if (g.sourceNorm.length >= row.sourceNorm.length) continue;
        if (!row.sourceNorm.startsWith(g.sourceNorm)) continue;
        if (!p1Group || g.sourceNorm.length > p1Group.sourceNorm.length) p1Group = g;
      }
      matchCache.set(cacheKey, p1Group);
    }

    if (!p1Group) continue;

    const p1Dom = getP1Dom(p1Group);
    if (!p1Dom) continue;

    const t = row.targets.get(tgtColIdx);
    if (!t?.rawText) continue;

    const p2Norm = t.fullNorm || '';
    if (!p2Norm) continue;

    if (termContainedIn(p1Dom.norm, p2Norm)) continue;

    issues.push({
      type: 'crossPriority',
      typeLabel: 'P1 미반영',
      category: row.category,
      priority: 2,
      basisText: row.sourceText,
      representativeText: p1Dom.display,
      problemText: t.strippedDisplay || t.rawText,
      note: `P1 기준어: "${p1Group.sourceText}" (대표 ${p1Dom.dominantCount}/${p1Dom.totalCount}행)`,
      rows: [row.rowIdx]
    });

    badRows.add(row.rowIdx);
    addRowMessage(
      rowMessages,
      row.rowIdx,
      `P1 번역 미반영 [${formatCategory(row.category)}/P2/${row.sourceText}] P1 기준: ${p1Dom.display} | P2 실제: ${t.rawText}`
    );
  }

  return issues;
}

function buildGlossary(preparedRows, fullGroups, tgtColIdx) {
  const glossaryByCategory = new Map();

  for (const group of fullGroups.values()) {
    if (group.priority !== 1 && group.priority !== 2) continue;
    const sourceContainKey = normalizeContainText(group.sourceText);
    if (!sourceContainKey || sourceContainKey.length < 2) continue;

    const counter = new Map();
    for (const rowIdx of group.rows) {
      const t = preparedRows[rowIdx].targets.get(tgtColIdx);
      const key = t.fullNorm || '__EMPTY__';
      if (!counter.has(key)) {
        counter.set(key, {
          count: 0,
          firstOrder: rowIdx,
          display: t.rawText || '(비어있음)',
          norm: t.fullNorm || '',
          rows: []
        });
      }
      const entry = counter.get(key);
      entry.count++;
      entry.rows.push(rowIdx);
    }

    const ranked = pickDominantFromCounter(counter);
    if (!ranked.length) continue;
    const dominant = ranked[0];
    if (!dominant.norm) continue;

    if (!glossaryByCategory.has(group.category)) glossaryByCategory.set(group.category, []);
    glossaryByCategory.get(group.category).push({
      category: group.category,
      priority: group.priority,
      sourceText: group.sourceText,
      sourceContainKey,
      targetDisplay: dominant.display,
      targetNorm: dominant.norm,
      variants: ranked.map(v => ({
        display: v.display,
        norm: counter.get(v.key)?.norm || v.key
      }))
    });
  }

  for (const list of glossaryByCategory.values()) {
    list.sort((a, b) =>
      (b.sourceContainKey.length - a.sourceContainKey.length) ||
      safeLocale(a.sourceText, b.sourceText)
    );
  }

  return glossaryByCategory;
}

function analyzeSentenceRows(preparedRows, glossaryByCategory, tgtColIdx, rowMessages, badRows) {
  const issues = [];

  for (const row of preparedRows) {
    if (row.priority !== 3) continue;
    if (!row.sourceText) continue;

    const glossary = glossaryByCategory.get(row.category) || [];
    if (!glossary.length) continue;

    const matches = [];
    for (const term of glossary) {
      if (row.sourceContainKey.includes(term.sourceContainKey)) {
        matches.push(term);
      }
    }
    if (!matches.length) continue;

    matches.sort((a, b) =>
      (b.sourceContainKey.length - a.sourceContainKey.length) ||
      safeLocale(a.sourceText, b.sourceText)
    );

    const selected = [];
    for (const match of matches) {
      if (selected.some(sel => sel.sourceContainKey.includes(match.sourceContainKey))) continue;
      selected.push(match);
    }

    const t = row.targets.get(tgtColIdx);
    const sentenceNorm = t.fullNorm || '';

    for (const term of selected) {
      if (containsComparable(sentenceNorm, term.targetNorm)) continue;

      let foundVariant = null;
      for (const variant of term.variants) {
        if (!variant.norm || variant.norm === term.targetNorm) continue;
        if (containsComparable(sentenceNorm, variant.norm)) {
          foundVariant = variant;
          break;
        }
      }

      issues.push({
        type: 'sentence',
        typeLabel: '문장(P3)',
        category: row.category,
        priority: 3,
        basisText: term.sourceText,
        representativeText: term.targetDisplay,
        problemText: foundVariant ? foundVariant.display : '(미포함)',
        note: foundVariant ? '문장 내 다른 변형 사용' : '문장 내 기준 용어 미포함',
        rows: [row.rowIdx]
      });

      badRows.add(row.rowIdx);

      if (foundVariant) {
        addRowMessage(
          rowMessages,
          row.rowIdx,
          `문장 내 다른 변형 [${formatCategory(row.category)}/P3/${term.sourceText}] 기준: ${term.targetDisplay} | 발견: ${foundVariant.display}`
        );
      } else {
        addRowMessage(
          rowMessages,
          row.rowIdx,
          `문장 내 용어 미포함 [${formatCategory(row.category)}/P3/${term.sourceText}] 기준: ${term.targetDisplay}`
        );
      }
    }
  }

  return issues;
}

function analyzeColumnAuto(preparedRows, fullGroups, baseGroups, tgtColIdx, hasPriorityColumn) {
  const rowMessages = new Map();
  const badRows = new Set();

  const fullIssues = analyzeFullGroups(preparedRows, fullGroups, tgtColIdx, false, rowMessages, badRows);
  const baseIssues = analyzeBaseGroups(preparedRows, baseGroups, tgtColIdx, hasPriorityColumn, rowMessages, badRows);

  let crossPriorityIssues = [];
  let sentenceIssues = [];
  if (hasPriorityColumn) {
    crossPriorityIssues = analyzeCrossPriorityCheck(preparedRows, fullGroups, tgtColIdx, rowMessages, badRows);
    const glossaryByCategory = buildGlossary(preparedRows, fullGroups, tgtColIdx);
    sentenceIssues = analyzeSentenceRows(preparedRows, glossaryByCategory, tgtColIdx, rowMessages, badRows);
  }

  const issues = [...crossPriorityIssues, ...baseIssues, ...fullIssues, ...sentenceIssues];
  issues.sort((a, b) =>
    (ISSUE_TYPE_ORDER[a.type] - ISSUE_TYPE_ORDER[b.type]) ||
    safeLocale(formatCategory(a.category), formatCategory(b.category)) ||
    (a.priority - b.priority) ||
    safeLocale(a.basisText, b.basisText) ||
    safeLocale(a.problemText, b.problemText)
  );

  return {
    issues,
    rowMessages,
    badRows,
    summary: {
      crossPriority: crossPriorityIssues.length,
      full: fullIssues.length,
      base: baseIssues.length,
      sentence: sentenceIssues.length
    }
  };
}

function analyzeColumnCell(preparedRows, fullGroups, tgtColIdx) {
  const rowMessages = new Map();
  const badRows = new Set();
  const fullIssues = analyzeFullGroups(preparedRows, fullGroups, tgtColIdx, true, rowMessages, badRows);

  const issues = [...fullIssues];
  issues.sort((a, b) =>
    safeLocale(formatCategory(a.category), formatCategory(b.category)) ||
    (a.priority - b.priority) ||
    safeLocale(a.basisText, b.basisText) ||
    safeLocale(a.problemText, b.problemText)
  );

  return {
    issues,
    rowMessages,
    badRows,
    summary: {
      full: fullIssues.length,
      base: 0,
      sentence: 0
    }
  };
}

function analyzeConsistency(rows, headers, srcColIdx, tgtColIdxArr, priorityColIdx, categoryColIdx, mode) {
  const preparedRows = prepareRows(rows, srcColIdx, priorityColIdx, categoryColIdx, tgtColIdxArr);
  const { fullGroups, baseGroups } = buildStaticGroups(preparedRows);

  const result = new Map();
  const globalBad = new Map();
  const globalRowMap = new Map();
  const hasPriorityColumn = priorityColIdx >= 0;

  for (const tgtColIdx of tgtColIdxArr) {
    const tgtColName = headers[tgtColIdx];
    const colResult = mode === 'auto'
      ? analyzeColumnAuto(preparedRows, fullGroups, baseGroups, tgtColIdx, hasPriorityColumn)
      : analyzeColumnCell(preparedRows, fullGroups, tgtColIdx);

    result.set(tgtColName, {
      issues: colResult.issues,
      tgtColIdx,
      summary: colResult.summary
    });

    mergeBadRows(globalBad, colResult.badRows, tgtColIdx);
    mergeColRowMessages(globalRowMap, colResult.rowMessages, tgtColIdx);
  }

  for (const [, colMap] of globalRowMap) {
    for (const [tgtColIdx, msgs] of colMap) {
      colMap.set(tgtColIdx, uniq(msgs));
    }
  }

  return {
    result,
    bad: globalBad,
    rowMap: globalRowMap
  };
}

function showLoadingOverlay() {
  setProgress(0);
  $('loadingOverlay').style.display = 'flex';
}

function hideLoadingOverlay() {
  $('loadingOverlay').style.display = 'none';
}

function setProgress(pct) {
  const c = 314.16;
  $('ringProgress').style.strokeDashoffset = c - (pct / 100) * c;
  $('ringPercent').textContent = Math.round(pct) + '%';
}

let dragCounter = 0;

document.addEventListener('dragenter', e => {
  e.preventDefault();
  dragCounter++;
  $('dropOverlay').classList.add('active');
});

document.addEventListener('dragleave', e => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    $('dropOverlay').classList.remove('active');
  }
});

document.addEventListener('dragover', e => e.preventDefault());

document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  $('dropOverlay').classList.remove('active');
  const file = e.dataTransfer?.files?.[0];
  if (file && /\.(xlsx|xls)$/i.test(file.name)) loadFile(file);
});

$('fileInput').addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (!file) return;
  e.target.value = '';
  loadFile(file);
});

function loadFile(file) {
  showLoadingOverlay();
  const reader = new FileReader();

  reader.onprogress = ev => {
    if (ev.lengthComputable) {
      setProgress(Math.round((ev.loaded / ev.total) * 60));
    }
  };

  reader.onload = ev => {
    setProgress(65);
    // Yield to browser so progress bar renders before heavy XLSX parse
    setTimeout(() => {
      try {
        workbook = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
        setProgress(82);

        // Sheet selector
        const sheetNames = workbook.SheetNames;
        const sheetSel = $('sheetSelect');
        sheetSel.innerHTML = '';
        sheetNames.forEach((name, i) => {
          const opt = document.createElement('option');
          opt.value = i;
          opt.textContent = name;
          sheetSel.appendChild(opt);
        });
        const multiSheet = sheetNames.length > 1;
        $('sheetSetupItem').style.display = multiSheet ? '' : 'none';
        $('sheetSep').style.display = multiSheet ? '' : 'none';

        $('fileNameBadge').textContent = file.name;
        $('setupArea').classList.remove('hidden');

        loadSheetData(0);

        setProgress(100);
        setTimeout(() => hideLoadingOverlay(), 350);
      } catch (err) {
        hideLoadingOverlay();
        alert('파일을 읽지 못했습니다: ' + err.message);
      }
    }, 16);
  };

  reader.onerror = () => {
    hideLoadingOverlay();
    alert('파일 읽기 오류가 발생했습니다.');
  };

  reader.readAsArrayBuffer(file);
}

function loadSheetData(sheetIdx) {
  const ws = workbook.Sheets[workbook.SheetNames[sheetIdx]];
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  if (!raw.length) {
    alert('선택한 시트에 데이터가 없습니다.');
    return;
  }

  const maxCols = Math.max(...raw.map(r => r.length), 0);
  headers = raw[0].map((h, i) => cellStr(h) || `열${i + 1}`);
  while (headers.length < maxCols) headers.push(`열${headers.length + 1}`);

  dataRows = raw.slice(1).map(r => {
    const p = [...r];
    while (p.length < headers.length) p.push('');
    return p;
  });

  $('statRows').style.display = '';
  $('statRowsText').textContent = `${dataRows.length}행`;
  $('analyzeBtn').disabled = false;

  populateColumnSelectors();

  analysisResult = null;
  badSet = null;
  resultMap = null;

  $('statIssue').textContent = '불일치 0';
  $('downloadBtn').disabled = true;
  $('emptyState').innerHTML = `
    <div class="ci-icon">🎯</div>
    <div class="ci-title">파일 준비 완료!</div>
    <div class="ci-desc">열 설정을 마치고 ⑤ 분석 버튼을 누르면<br>검사가 바로 시작돼요</div>
  `;
  $('emptyState').style.display = '';
  $('issueArea').style.display = 'none';
  $('issueArea').innerHTML = '';
}

function populateColumnSelectors() {
  const priDetected = detectHeaderIndex(PRIORITY_HEADER_HINTS);
  const catDetected = detectHeaderIndex(CATEGORY_HEADER_HINTS);

  // Source column
  const srcSel = $('srcColSelect');
  srcSel.innerHTML = '<option value="" disabled selected style="color:var(--muted)">원본 언어 선택</option>';
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = h;
    srcSel.appendChild(opt);
  });

  // Priority column
  const priSel = $('priorityColSelect');
  priSel.innerHTML = '<option value="">사용 안 함</option>';
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = h;
    priSel.appendChild(opt);
  });
  const priBadge = $('priorityAutoBadge');
  if (priDetected >= 0) {
    priSel.value = String(priDetected);
    priBadge.textContent = `자동감지`;
    priBadge.className = 'setup-auto-badge';
    priBadge.style.display = '';
  } else {
    priBadge.style.display = 'none';
  }

  // Category column
  const catSel = $('categoryColSelect');
  catSel.innerHTML = '<option value="">사용 안 함</option>';
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = h;
    catSel.appendChild(opt);
  });
  const catBadge = $('categoryAutoBadge');
  if (catDetected >= 0) {
    catSel.value = String(catDetected);
    catBadge.textContent = `자동감지`;
    catBadge.className = 'setup-auto-badge';
    catBadge.style.display = '';
  } else {
    catBadge.style.display = 'none';
  }

  // Target column (single select)
  const tgtSel = $('tgtColSelect');
  tgtSel.innerHTML = '<option value="" disabled selected style="color:var(--muted)">번역 언어 선택</option>';
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = h;
    tgtSel.appendChild(opt);
  });

  // Attach badge-update listeners (once per load)
  if (!priSel._badgeListenerAdded) {
    priSel._badgeListenerAdded = true;
    priSel.addEventListener('change', () => {
      const badge = $('priorityAutoBadge');
      if (!priSel.value) { badge.style.display = 'none'; return; }
      badge.style.display = '';
      const autoVal = detectHeaderIndex(PRIORITY_HEADER_HINTS);
      if (autoVal >= 0 && String(autoVal) === priSel.value) {
        badge.textContent = '자동감지'; badge.className = 'setup-auto-badge';
      } else {
        badge.textContent = '수동선택'; badge.className = 'setup-auto-badge manual';
      }
    });
  }
  if (!catSel._badgeListenerAdded) {
    catSel._badgeListenerAdded = true;
    catSel.addEventListener('change', () => {
      const badge = $('categoryAutoBadge');
      if (!catSel.value) { badge.style.display = 'none'; return; }
      badge.style.display = '';
      const autoVal = detectHeaderIndex(CATEGORY_HEADER_HINTS);
      if (autoVal >= 0 && String(autoVal) === catSel.value) {
        badge.textContent = '자동감지'; badge.className = 'setup-auto-badge';
      } else {
        badge.textContent = '수동선택'; badge.className = 'setup-auto-badge manual';
      }
    });
  }

  refreshTgtSelectState();
}

function refreshTgtSelectState() {
  const excluded = getExcludedColIdxSet();
  const tgtSel = $('tgtColSelect');
  const currentVal = tgtSel.value;

  Array.from(tgtSel.options).forEach(opt => {
    if (opt.value === '') return;
    const idx = parseInt(opt.value, 10);
    opt.disabled = excluded.has(idx);
    if (excluded.has(idx) && currentVal === opt.value) {
      tgtSel.value = '';
    }
  });

}

$('analyzeBtn').addEventListener('click', doAnalyze);

function doAnalyze() {
  const srcColIdx = getSrcColIdx();
  const priorityColIdx = getOptionalColIdx('priorityColSelect');
  const categoryColIdx = getOptionalColIdx('categoryColSelect');
  const tgtColIdxArr = getTgtColIdxArr();

  if (!tgtColIdxArr.length) {
    alert('비교 열을 하나 이상 선택해 주세요.');
    return;
  }

  const mode = getMode();
  const analyzed = analyzeConsistency(
    dataRows,
    headers,
    srcColIdx,
    tgtColIdxArr,
    priorityColIdx,
    categoryColIdx,
    mode
  );

  analysisResult = analyzed.result;
  badSet = analyzed.bad;
  resultMap = analyzed.rowMap;

  let total = 0;
  for (const [, { issues }] of analysisResult) total += issues.length;
  $('statIssue').textContent = `불일치 ${total}`;

  // 분석 재실행 시 필터 초기화
  filterType = 'all';
  filterPri = 'all';
  $('filterBar').querySelectorAll('[data-ftype]').forEach((b, i) => b.classList.toggle('f-active', i === 0));
  $('filterBar').querySelectorAll('[data-fpri]').forEach((b, i) => b.classList.toggle('f-active', i === 0));
  $('filteredCount').textContent = '';

  renderIssues(tgtColIdxArr);
  $('downloadBtn').disabled = false;
}

function renderIssues(tgtColIdxArr) {
  const area = $('issueArea');
  area.innerHTML = '';
  $('emptyState').style.display = 'none';
  area.style.display = '';
  $('filterBar').style.display = '';

  let totalIssues = 0, totalCross = 0, totalBase = 0, totalFull = 0, totalSent = 0, okCols = 0;
  for (const [, { issues, summary }] of analysisResult) {
    totalIssues += issues.length;
    totalCross += summary.crossPriority || 0;
    totalBase += summary.base || 0;
    totalFull += summary.full || 0;
    totalSent += summary.sentence || 0;
    if (!issues.length) okCols++;
  }
  const badRowCount = badSet ? badSet.size : 0;

  const frag = document.createDocumentFragment();

  // --- 요약 바 ---
  const bar = document.createElement('div');
  bar.className = 'summary-bar';
  const chipDefs = [
    ['s-chip', `불일치 ${totalIssues}건`],
    ['s-chip cross', `P1 미반영 ${totalCross}건`],
    ['s-chip violet', `대표어(base) ${totalBase}건`],
    ['s-chip info', `전체 원문 ${totalFull}건`],
    ['s-chip', `P3 문장 ${totalSent}건`],
    ['s-chip info', `문제 행 ${badRowCount}개`],
  ];
  if (okCols) chipDefs.push(['s-chip ok', `이상 없는 열 ${okCols}개`]);
  chipDefs.push(['s-chip info', `전체 ${dataRows.length}행 · ${tgtColIdxArr.length}개 비교 열`]);
  for (const [cls, txt] of chipDefs) {
    const c = document.createElement('span');
    c.className = cls;
    c.textContent = txt;
    bar.appendChild(c);
  }
  frag.appendChild(bar);

  // --- 이슈 카드 ---
  for (const [colName, { issues, summary }] of analysisResult) {
    const card = document.createElement('div');
    card.className = 'issue-card';

    // 헤드 (클릭으로 접기/펼치기)
    const head = document.createElement('div');
    head.className = 'icard-head';
    const cross = summary.crossPriority || 0;
    if (issues.length) {
      head.innerHTML = `
        <span class="icard-colname">${escHtml(colName)}</span>
        <span class="icard-count">총 ${issues.length}건</span>
        ${cross ? `<span class="icard-count" style="color:#ff6b6b">P1미반영 ${cross}건</span>` : ''}
        <span class="icard-count">대표어 ${summary.base || 0}건</span>
        <span class="icard-count">전체원문 ${summary.full || 0}건</span>
        <span class="icard-count">P3 ${summary.sentence || 0}건</span>
        <span class="icard-toggle">▲</span>
      `;
    } else {
      head.innerHTML = `
        <span class="icard-colname">${escHtml(colName)}</span>
        <span class="icard-ok">✓ 이상 없음</span>
        <span class="icard-toggle" style="visibility:hidden">▲</span>
      `;
    }
    card.appendChild(head);

    // 바디 (접기 대상)
    const body = document.createElement('div');
    body.className = 'icard-body';

    if (issues.length) {
      const table = document.createElement('table');
      table.className = 'icard-table';
      table.innerHTML = `
        <thead>
          <tr>
            <th>종류</th>
            <th>분류</th>
            <th>P</th>
            <th>기준어 / base</th>
            <th>기준 번역 (P1/대표)</th>
            <th>실제 번역 / 상태 <span style="font-weight:400;opacity:.6;font-size:10px">주황=불일치 단어</span></th>
            <th>행 번호 (Excel)</th>
          </tr>
        </thead>
      `;

      const tbody = document.createElement('tbody');
      for (const issue of issues) {
        const tr = document.createElement('tr');
        tr.className = 'issue-row';
        tr.dataset.itype = issue.type;
        tr.dataset.ipri = String(issue.priority);

        // 종류 배지
        const kindClass =
          issue.type === 'crossPriority' ? 'cross' :
          issue.type === 'base' ? 'base' :
          issue.type === 'sentence' ? 'sentence' : 'full';
        const tdKind = document.createElement('td');
        tdKind.className = 'td-kind';
        tdKind.innerHTML = `<span class="badge-kind ${kindClass}">${escHtml(issue.typeLabel)}</span>`;
        tr.appendChild(tdKind);

        const tdCat = document.createElement('td');
        tdCat.className = 'td-cat';
        tdCat.textContent = formatCategory(issue.category);
        tr.appendChild(tdCat);

        const tdPri = document.createElement('td');
        tdPri.className = 'td-pri';
        tdPri.textContent = `P${issue.priority}`;
        tr.appendChild(tdPri);

        const tdSrc = document.createElement('td');
        tdSrc.className = 'td-src';
        tdSrc.textContent = issue.basisText;
        tr.appendChild(tdSrc);

        // 기준 번역 (대표/P1)
        const tdFirst = document.createElement('td');
        tdFirst.className = 'td-first';
        tdFirst.innerHTML = `<span class="badge-first">기준</span>${escHtml(issue.representativeText || '(비어있음)')}`;
        tr.appendChild(tdFirst);

        // 실제 번역 — diff 하이라이트
        const tdBad = document.createElement('td');
        tdBad.className = 'td-bad';
        const badLabel = issue.type === 'sentence' ? '상태' : '실제';
        tdBad.innerHTML = `<span class="badge-bad">${badLabel}</span>${diffWordsHtml(issue.representativeText, issue.problemText)}`;
        if (issue.note) {
          const noteDiv = document.createElement('div');
          noteDiv.className = 'td-note';
          noteDiv.textContent = issue.note;
          tdBad.appendChild(noteDiv);
        }
        tr.appendChild(tdBad);

        const tdRows = document.createElement('td');
        tdRows.className = 'td-rows';
        tdRows.textContent = formatRowsExcel(issue.rows);
        tr.appendChild(tdRows);

        tbody.appendChild(tr);
      }

      table.appendChild(tbody);
      body.appendChild(table);
    }

    card.appendChild(body);

    // 접기/펼치기 이벤트
    head.addEventListener('click', () => {
      if (!issues.length) return;
      head.classList.toggle('collapsed');
      body.classList.toggle('collapsed');
    });

    frag.appendChild(card);
  }

  area.appendChild(frag);
  applyIssueFilter();
}

$('downloadBtn').addEventListener('click', downloadExcel);

async function downloadExcel() {
  if (!analysisResult || !dataRows.length) return;

  const btn = $('downloadBtn');
  btn.disabled = true;
  btn.textContent = '생성 중...';

  try {
    const srcColIdx = getSrcColIdx();
    const priorityColIdx = getOptionalColIdx('priorityColSelect');
    const categoryColIdx = getOptionalColIdx('categoryColSelect');
    const tgtColIdxArr = getTgtColIdxArr();
    const tgtSet = new Set(tgtColIdxArr);

    const metaSet = new Set([srcColIdx]);
    if (priorityColIdx >= 0) metaSet.add(priorityColIdx);
    if (categoryColIdx >= 0) metaSet.add(categoryColIdx);

    const resultCols = [...analysisResult.entries()].map(([colName, { tgtColIdx }]) => ({
      colName,
      tgtColIdx,
      header: `${colName}_검수결과`
    }));

    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('단어일치검수');

    const headerRow = ws.addRow([...headers, ...resultCols.map(rc => rc.header)]);
    headerRow.height = 20;

    headerRow.eachCell((cell, colNum) => {
      const ci = colNum - 1;

      if (ci === srcColIdx) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A3A5C' } };
        cell.font = { bold: true, color: { argb: 'FF79C0FF' }, size: 11 };
      } else if (priorityColIdx >= 0 && ci === priorityColIdx) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF3C2A5C' } };
        cell.font = { bold: true, color: { argb: 'FFC8A2FF' }, size: 11 };
      } else if (categoryColIdx >= 0 && ci === categoryColIdx) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF204A4F' } };
        cell.font = { bold: true, color: { argb: 'FF8DEBFF' }, size: 11 };
      } else if (ci < headers.length && tgtSet.has(ci)) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF5C3A00' } };
        cell.font = { bold: true, color: { argb: 'FFFFA657' }, size: 11 };
      } else if (ci >= headers.length) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4A3000' } };
        cell.font = { bold: true, color: { argb: 'FFFFCC80' }, size: 11 };
      } else {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2C3E50' } };
        cell.font = { bold: true, color: { argb: 'FFE6EDF3' }, size: 11 };
      }

      cell.border = { bottom: { style: 'medium', color: { argb: 'FF555555' } } };
      cell.alignment = { vertical: 'middle' };
    });

    ws.views = [{ state: 'frozen', ySplit: 1 }];

    dataRows.forEach((row, rowIdx) => {
      const resultVals = resultCols.map(rc => {
        const msgs = resultMap?.get(rowIdx)?.get(rc.tgtColIdx) || [];
        return msgs.length ? uniq(msgs).join('\n') : '';
      });

      const excelRow = ws.addRow([...row, ...resultVals]);

      excelRow.eachCell({ includeEmpty: true }, (cell, colNum) => {
        const ci = colNum - 1;

        if (ci < headers.length) {
          if (badSet?.has(rowIdx) && badSet.get(rowIdx).has(ci)) {
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFE0B2' } };
            cell.font = { bold: true, color: { argb: 'FFC45300' } };
          }
          cell.alignment = { vertical: 'middle' };
        } else {
          const rcIdx = ci - headers.length;
          const rc = resultCols[rcIdx];
          if (rc && resultMap?.has(rowIdx) && resultMap.get(rowIdx).has(rc.tgtColIdx)) {
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF3E0' } };
            cell.font = { color: { argb: 'FFB94000' } };
            cell.alignment = { wrapText: true, vertical: 'top' };
          }
        }
      });
    });

    ws.columns.forEach((col, ci) => {
      if (ci >= headers.length) {
        col.width = 52;
        return;
      }

      let maxLen = (headers[ci] || '').length + 2;
      col.eachCell({ includeEmpty: false }, cell => {
        const len = String(cell.value ?? '').length;
        if (len > maxLen) maxLen = len;
      });
      col.width = Math.min(maxLen + 2, 40);
    });

    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    });

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '단어일치검수_결과.xlsx';
    a.click();
    URL.revokeObjectURL(url);
  } finally {
    btn.disabled = false;
    btn.textContent = '엑셀 내보내기';
  }
}

document.querySelectorAll('.mode-group label').forEach(label => {

    label.classList.add('active');

    if (r) r.checked = true;

    if (r && r.name === 'tokenMatch' && analysisResult && analysisResult.size > 0) {
      doAnalyze();
    }
  });
});

});

// --- 필터 ---
let filterType = 'all';
let filterPri = 'all';

function applyIssueFilter() {
  const rows = document.querySelectorAll('.issue-row');
  let vis = 0;
  rows.forEach(tr => {
    const ok = (filterType === 'all' || tr.dataset.itype === filterType)
             && (filterPri === 'all' || tr.dataset.ipri === filterPri);
    tr.style.display = ok ? '' : 'none';
    if (ok) vis++;
  });
  const isFiltered = filterType !== 'all' || filterPri !== 'all';
  const fc = $('filteredCount');
  if (fc) fc.textContent = isFiltered ? `표시 ${vis}건` : '';
}

$('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;

  if ('ftype' in btn.dataset) {
    filterType = btn.dataset.ftype;
    $('filterBar').querySelectorAll('[data-ftype]').forEach(b => b.classList.remove('f-active'));
    btn.classList.add('f-active');
  } else if ('fpri' in btn.dataset) {
    filterPri = btn.dataset.fpri;
    $('filterBar').querySelectorAll('[data-fpri]').forEach(b => b.classList.remove('f-active'));
    btn.classList.add('f-active');
  }

  applyIssueFilter();
});

<script>
(function(){
  const toggle = document.getElementById('themeToggle');
  const key = 'theme-preference';
  const saved = localStorage.getItem(key);
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    toggle.textContent = '🌙';
  }
  toggle.addEventListener('click', function(){
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      toggle.textContent = '☀️';
      localStorage.setItem(key, 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '🌙';
      localStorage.setItem(key, 'dark');
    }
  });
})();
</script>
