<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>단어 일치 검수</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: rgba(255,255,255,0.03);
      --surface2: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --warn: #ffa657;
      --ok: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 13px; line-height: 1.5;
      display: flex; flex-direction: column;
    }

    /* ── 드래그오버 오버레이 ── */
    .drop-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      background: rgba(13,17,23,0.92);
      border: 3px dashed rgba(88,166,255,0.55);
      margin: 10px; border-radius: 16px;
      pointer-events: none; opacity: 0; transition: opacity .15s;
    }
    .drop-overlay.active { opacity: 1; }
    .drop-overlay-icon { font-size: 40px; }
    .drop-overlay-txt { font-size: 18px; font-weight: 800; color: var(--accent); }

    /* ── NAV ── */
    .nav {
      flex-shrink: 0;
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; gap: 6px;
      height: 44px; padding: 0 16px;
      background: rgba(13,17,23,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-weight: 900; font-size: 13px; color: var(--text); margin-right: 6px; }
    .nav a {
      text-decoration: none; font-size: 12px; font-weight: 700;
      color: var(--muted); padding: 5px 10px;
      border-radius: 8px; border: 1px solid transparent; transition: .1s;
    }
    .nav a:hover { color: var(--text); background: var(--surface2); }
    .nav a.active { color: var(--accent); border-color: rgba(88,166,255,0.35); background: rgba(88,166,255,0.1); }

    /* ── TOOLBAR ── */
    .toolbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; flex-wrap: wrap;
      background: rgba(255,255,255,0.015);
      border-bottom: 1px solid var(--border);
    }
    .sep { width: 1px; height: 20px; background: var(--border2); margin: 0 2px; }

    .btn {
      display: inline-flex; align-items: center;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--text); font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: .1s;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.success { background: rgba(63,185,80,0.15); border-color: rgba(63,185,80,0.4); color: #56d364; }
    .btn.success:hover { background: rgba(63,185,80,0.25); }
    .btn[disabled] { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
    .upload-label { cursor: pointer; }
    .upload-label input[type="file"] { display: none; }

    .mode-group { display: flex; border: 1px solid var(--border2); border-radius: 8px; }
    .mode-group label {
      display: flex; align-items: center;
      padding: 5px 11px; font-size: 12px; font-weight: 700;
      color: var(--muted); cursor: pointer; user-select: none;
      border-right: 1px solid var(--border); transition: .1s;
    }
    .mode-group label:first-child { border-radius: 7px 0 0 7px; }
    .mode-group label:last-child { border-right: 0; border-radius: 0 7px 7px 0; }
    .mode-group label.active { background: rgba(88,166,255,0.12); color: #79c0ff; }
    .mode-group label:not(.active):hover { background: var(--surface2); color: var(--text); }
    .mode-group input[type="radio"] { display: none; }

    .stat {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 8px; border-radius: 999px;
      border: 1px solid var(--border); font-size: 11px; color: var(--muted);
    }
    .dot-w { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); display: inline-block; }
    .dot-m { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; }

    /* Tooltip */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 7px); left: 50%;
      transform: translateX(-50%);
      max-width: 260px; white-space: normal; text-align: left;
      padding: 6px 9px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,14,22,0.97);
      color: rgba(230,237,243,0.92); font-size: 11px; line-height: 1.45;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none; transition: opacity .1s; z-index: 9999;
    }
    [data-tip]:hover::after { opacity: 1; }
    .toolbar [data-tip]::after { bottom: auto; top: calc(100% + 7px); }

    /* ── SETUP ── */
    .setup {
      flex-shrink: 0;
      display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }
    .setup.hidden { display: none; }
    .setup-item { display: flex; flex-direction: column; gap: 4px; }
    .setup-lbl { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .4px; }

    select {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border2); border-radius: 8px;
      padding: 5px 9px; font-size: 12px; cursor: pointer;
      min-width: 160px;
    }
    select:focus { outline: none; border-color: var(--accent); }
    select option { background: #161b22; }

    /* ── 커스텀 멀티셀렉트 드롭다운 ── */
    .ms-wrap { position: relative; }
    .ms-btn {
      display: inline-flex; align-items: center; justify-content: space-between; gap: 8px;
      min-width: 200px; padding: 5px 9px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border2); border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: .1s;
      white-space: nowrap;
    }
    .ms-btn:hover { background: rgba(255,255,255,0.1); }
    .ms-btn.open { border-color: rgba(255,166,87,0.5); background: rgba(255,166,87,0.07); }
    .ms-btn .ms-arrow { font-size: 9px; color: var(--muted); transition: transform .15s; }
    .ms-btn.open .ms-arrow { transform: rotate(180deg); }
    .ms-btn .ms-label { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; }
    .ms-panel {
      position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
      min-width: 230px; max-height: 280px; overflow-y: auto;
      background: rgba(16,20,28,0.99); border: 1px solid var(--border2);
      border-radius: 10px; padding: 4px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      display: none;
    }
    .ms-panel.open { display: block; }
    .ms-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 8px 7px; border-bottom: 1px solid var(--border); margin-bottom: 3px;
    }
    .ms-header-txt { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    .ms-all-btn { font-size: 11px; font-weight: 700; color: var(--accent); cursor: pointer; }
    .ms-all-btn:hover { color: #79c0ff; }
    .ms-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 8px; border-radius: 6px; cursor: pointer;
      font-size: 12px; color: var(--muted); transition: .1s;
    }
    .ms-item:hover { background: var(--surface2); color: var(--text); }
    .ms-item.on { color: var(--warn); }
    .ms-check {
      width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 900;
    }
    .ms-item.on .ms-check { background: rgba(255,166,87,0.25); border-color: rgba(255,166,87,0.6); color: var(--warn); }

    /* ── 분석 버튼 (setup 안에 있는 버전) ── */
    .btn.analyze {
      background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #79c0ff;
      padding: 6px 18px; font-size: 13px;
    }
    .btn.analyze:hover { background: rgba(88,166,255,0.25); }

    /* ── CONTENT (전체 너비 불일치 목록) ── */
    .content {
      flex: 1; overflow-y: auto;
      padding: 14px 16px 40px;
    }

    .content-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 60px 20px;
      color: var(--muted); font-size: 13px; text-align: center;
    }
    .content-empty .ci-icon { font-size: 36px; opacity: .4; }

    /* 요약 바 */
    .summary-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding-bottom: 12px;
    }
    .s-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      border: 1px solid rgba(255,166,87,0.3);
      background: rgba(255,166,87,0.08); color: var(--warn);
    }
    .s-chip.ok { border-color: rgba(63,185,80,0.3); background: rgba(63,185,80,0.08); color: #56d364; }
    .s-chip.info { border-color: rgba(88,166,255,0.3); background: rgba(88,166,255,0.08); color: var(--accent); }

    /* 불일치 카드 */
    .issue-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 12px; overflow: hidden;
    }
    .icard-head {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      background: rgba(255,166,87,0.06);
      border-bottom: 1px solid var(--border);
    }
    .icard-colname { font-size: 12px; font-weight: 800; color: var(--warn); }
    .icard-count { font-size: 11px; color: var(--muted); }
    .icard-ok { font-size: 12px; font-weight: 700; color: #56d364; }

    .icard-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .icard-table thead th {
      padding: 7px 14px; text-align: left;
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .3px;
      color: var(--muted); background: rgba(0,0,0,0.15);
      border-bottom: 1px solid var(--border);
    }
    .icard-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
    .icard-table tbody tr:last-child { border-bottom: 0; }
    .icard-table tbody tr.grp-first td { border-top: 1px solid rgba(255,255,255,0.06); }
    .icard-table tbody tr.grp-first:first-child td { border-top: 0; }
    .icard-table td {
      padding: 6px 14px; vertical-align: middle;
    }
    .td-src {
      font-family: ui-monospace, Consolas, monospace;
      font-weight: 700; font-size: 12px; color: var(--text);
      width: 200px; max-width: 240px;
      border-right: 1px solid var(--border);
      vertical-align: top; padding-top: 10px;
      word-break: break-all;
    }
    .td-first {
      color: #56d364; font-weight: 600;
      border-right: 1px solid var(--border);
      vertical-align: top; padding-top: 10px;
      width: 220px; max-width: 260px; word-break: break-all;
    }
    .td-bad { color: var(--warn); font-weight: 600; word-break: break-all; }
    .td-rows {
      font-size: 11px; color: var(--muted);
      width: 140px; white-space: normal; word-break: break-all;
    }
    .badge-first {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 4px; margin-right: 4px;
      background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.35); color: #56d364;
    }
    .badge-bad {
      display: inline-flex; align-items: center;
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 4px; margin-right: 4px;
      background: rgba(255,166,87,0.12); border: 1px solid rgba(255,166,87,0.4); color: var(--warn);
    }
  </style>
</head>
<body>

<!-- 드래그오버 오버레이 -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-overlay-icon">📂</div>
  <div class="drop-overlay-txt">xlsx 파일을 여기에 놓으세요</div>
</div>

<!-- NAV -->
<nav class="nav">
  <span class="nav-brand">TOOLS</span>
  <a href="review.html"      data-page="review.html">번역 검수</a>
  <a href="strscan.html"     data-page="strscan.html">문자열 탐지</a>
  <a href="placeholder.html" data-page="placeholder.html">플레이스홀더</a>
  <a href="wordcheck.html"   data-page="wordcheck.html">단어 일치 검수</a>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <label class="btn upload-label" id="uploadLabel" data-tip="클릭하거나 파일을 드래그해서 업로드">
    엑셀 업로드
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </label>
  <span id="fileNameBadge" style="font-size:11px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>

  <div class="sep"></div>

  <span style="font-size:11px;font-weight:800;color:var(--muted)">비교 방식</span>
  <div class="mode-group">
    <label data-tip="셀 내용 전체를 하나의 단위로 비교합니다">
      <input type="radio" name="mode" value="cell" checked> 셀 전체
    </label>
    <label data-tip="소스·타겟 모두 단어 단위로 분리하여 위치 기반으로 매핑합니다">
      <input type="radio" name="mode" value="word"> 개별 단어
    </label>
  </div>

  <div class="sep"></div>

  <span class="stat"><span class="dot-w"></span><span id="statIssue">불일치 0</span></span>
  <span class="stat" id="statRows" style="display:none"><span class="dot-m"></span><span id="statRowsText"></span></span>

  <div class="sep"></div>

  <button class="btn success" id="downloadBtn" disabled data-tip="불일치 셀 색칠 + 결과 열이 추가된 xlsx 파일로 내보냅니다">엑셀 내보내기</button>
</div>

<!-- SETUP (파일 업로드 후 표시) -->
<div class="setup hidden" id="setupArea">
  <div class="setup-item">
    <span class="setup-lbl">① 원본 열 (기준)</span>
    <select id="srcColSelect"></select>
  </div>
  <div class="setup-item">
    <span class="setup-lbl">② 비교 열 (번역 결과, 복수 선택)</span>
    <div class="ms-wrap" id="msWrap">
      <button class="ms-btn" id="msBtn" type="button">
        <span class="ms-label" id="msBtnLabel">열을 선택하세요</span>
        <span class="ms-arrow">▼</span>
      </button>
      <div class="ms-panel" id="msPanel">
        <div class="ms-header">
          <span class="ms-header-txt">비교 열 선택</span>
          <span class="ms-all-btn" id="msAllBtn">전체 선택</span>
        </div>
        <div id="msItems"></div>
      </div>
    </div>
  </div>
  <div class="setup-item" style="padding-bottom:1px">
    <span class="setup-lbl" style="visibility:hidden">분석</span>
    <button class="btn analyze" id="analyzeBtn" disabled>③ 분석</button>
  </div>
</div>

<!-- CONTENT (전체 너비 불일치 목록) -->
<div class="content" id="content">
  <div class="content-empty" id="emptyState">
    <div class="ci-icon">📋</div>
    <div>엑셀 파일을 업로드하고 열을 선택한 뒤 분석 버튼을 누르세요.</div>
  </div>
  <div id="issueArea" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
<script>
const $ = id => document.getElementById(id);

// ── STATE ──
let headers   = [];
let dataRows  = [];
let analysisResult = null;
let badSet    = null;
let firstSet  = null;
let resultMap = null;

// ── UTILS ──
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function cellStr(v) { return String(v ?? '').trim(); }

// ── DRAG AND DROP ──
let dragCounter = 0;
document.addEventListener('dragenter', e => {
  e.preventDefault();
  dragCounter++;
  $('dropOverlay').classList.add('active');
});
document.addEventListener('dragleave', () => {
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; $('dropOverlay').classList.remove('active'); }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  $('dropOverlay').classList.remove('active');
  const file = e.dataTransfer?.files[0];
  if (file && /\.(xlsx|xls)$/i.test(file.name)) loadFile(file);
});

// ── FILE UPLOAD ──
$('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  loadFile(file);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (!raw.length) { alert('데이터가 없습니다.'); return; }

      const maxCols = Math.max(...raw.map(r => r.length));
      headers = raw[0].map((h, i) => cellStr(h) || `열${i + 1}`);
      while (headers.length < maxCols) headers.push(`열${headers.length + 1}`);

      dataRows = raw.slice(1).map(r => {
        const p = [...r];
        while (p.length < headers.length) p.push('');
        return p;
      });

      $('fileNameBadge').textContent = file.name;
      $('statRows').style.display = '';
      $('statRowsText').textContent = `${dataRows.length}행`;
      $('setupArea').classList.remove('hidden');
      $('analyzeBtn').disabled = false;

      populateColumnSelectors();

      // 상태 리셋
      analysisResult = null; badSet = null; firstSet = null; resultMap = null;
      $('statIssue').textContent = '불일치 0';
      $('downloadBtn').disabled = true;
      $('emptyState').style.display = '';
      $('issueArea').style.display = 'none';
      $('issueArea').innerHTML = '';
    } catch(err) {
      alert('파일을 읽지 못했습니다: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── COLUMN SELECTORS ──
function populateColumnSelectors() {
  const srcSel = $('srcColSelect');
  srcSel.innerHTML = '';
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = h;
    srcSel.appendChild(opt);
  });

  const msItems = $('msItems');
  msItems.innerHTML = '';
  headers.forEach((h, i) => {
    const item = document.createElement('div');
    item.className = 'ms-item';
    item.dataset.idx = i;
    item.innerHTML = `<span class="ms-check"></span><span class="ms-name">${escHtml(h)}</span>`;
    item.addEventListener('click', () => {
      item.classList.toggle('on');
      const chk = item.querySelector('.ms-check');
      chk.textContent = item.classList.contains('on') ? '✓' : '';
      updateMsBtnLabel();
    });
    msItems.appendChild(item);
  });
  updateMsBtnLabel();
}

// 멀티셀렉트 버튼 텍스트 업데이트
function updateMsBtnLabel() {
  const selected = [...$('msItems').querySelectorAll('.ms-item.on')];
  const label = $('msBtnLabel');
  if (!selected.length) {
    label.textContent = '열을 선택하세요';
    $('msBtn').style.color = 'var(--muted)';
  } else if (selected.length === 1) {
    label.textContent = selected[0].querySelector('.ms-name').textContent;
    $('msBtn').style.color = 'var(--warn)';
  } else {
    label.textContent = `${selected.length}개 열 선택됨`;
    $('msBtn').style.color = 'var(--warn)';
  }
}

// 드롭다운 토글
$('msBtn').addEventListener('click', e => {
  e.stopPropagation();
  const panel = $('msPanel');
  const btn   = $('msBtn');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
});
document.addEventListener('click', e => {
  if (!$('msWrap').contains(e.target)) {
    $('msPanel').classList.remove('open');
    $('msBtn').classList.remove('open');
  }
});

// 전체 선택/해제
let msAllState = false;
$('msAllBtn').addEventListener('click', () => {
  msAllState = !msAllState;
  $('msAllBtn').textContent = msAllState ? '전체 해제' : '전체 선택';
  $('msItems').querySelectorAll('.ms-item').forEach(item => {
    const chk = item.querySelector('.ms-check');
    if (msAllState) { item.classList.add('on'); chk.textContent = '✓'; }
    else            { item.classList.remove('on'); chk.textContent = ''; }
  });
  updateMsBtnLabel();
});

function getMode()        { return document.querySelector('input[name="mode"]:checked')?.value ?? 'cell'; }
function getSrcColIdx()   { return parseInt($('srcColSelect').value, 10); }
function getTgtColIdxArr(){
  return [...$('msItems').querySelectorAll('.ms-item.on')].map(el => parseInt(el.dataset.idx, 10));
}

// ── SPLIT HELPER ──
const SPLIT_RE = /[\s\t\r\n,，、;；·\-\/]+/;
function splitWords(s) {
  return s.split(SPLIT_RE)
    .map(w => w.replace(/^['"()\[\]{}<>«»]+|['"()\[\]{}<>«»]+$/g, '').trim())
    .filter(w => w.length >= 1);
}

// ── ANALYSIS ──
function analyzeConsistency(rows, headers, srcColIdx, tgtColIdxArr, mode) {
  const result = new Map();

  for (const tgtColIdx of tgtColIdxArr) {
    const tgtColName = headers[tgtColIdx];
    const tracker = new Map(); // srcKey → { firstTgt, firstRow, variants: Map<tgt, rowIdx[]> }

    rows.forEach((row, rowIdx) => {
      const srcCell = cellStr(row[srcColIdx]);
      const tgtCell = cellStr(row[tgtColIdx]);
      if (!srcCell) return;

      let pairs; // [{srcKey, tgtKey}]

      if (mode === 'word') {
        // 소스·타겟 모두 단어 분리 → 위치 기반 매핑
        const srcWords = splitWords(srcCell);
        const tgtWords = splitWords(tgtCell);

        if (!srcWords.length) {
          pairs = [{ srcKey: srcCell, tgtKey: tgtCell }];
        } else {
          pairs = srcWords.map((sw, i) => ({
            srcKey: sw,
            // 대응하는 타겟 단어가 있으면 그것만 사용, 없으면 전체 셀 폴백
            tgtKey: i < tgtWords.length ? tgtWords[i] : tgtCell
          }));
        }
      } else {
        pairs = [{ srcKey: srcCell, tgtKey: tgtCell }];
      }

      for (const { srcKey, tgtKey } of pairs) {
        if (!tracker.has(srcKey)) {
          tracker.set(srcKey, {
            firstTgt: tgtKey,
            firstRow: rowIdx,
            variants: new Map([[tgtKey, [rowIdx]]])
          });
        } else {
          const entry = tracker.get(srcKey);
          if (!entry.variants.has(tgtKey)) entry.variants.set(tgtKey, []);
          entry.variants.get(tgtKey).push(rowIdx);
        }
      }
    });

    const issues = [];
    for (const [src, data] of tracker) {
      if (data.variants.size > 1) {
        issues.push({ src, firstTgt: data.firstTgt, firstRow: data.firstRow, variants: data.variants });
      }
    }
    issues.sort((a, b) => String(a.src).localeCompare(String(b.src), 'ko'));
    result.set(tgtColName, { issues, tgtColIdx });
  }
  return result;
}

function buildIssueSets(analysisResult) {
  const bad   = new Map();
  const first = new Map();
  const rMap  = new Map(); // rowIdx → Map<tgtColIdx, [{src, firstTgt, currentTgt}]>

  for (const [, { issues, tgtColIdx }] of analysisResult) {
    for (const issue of issues) {
      for (const [tgt, rowIdxArr] of issue.variants) {
        for (const rowIdx of rowIdxArr) {
          if (tgt !== issue.firstTgt) {
            if (!bad.has(rowIdx)) bad.set(rowIdx, new Set());
            bad.get(rowIdx).add(tgtColIdx);
            if (!rMap.has(rowIdx)) rMap.set(rowIdx, new Map());
            const colMap = rMap.get(rowIdx);
            if (!colMap.has(tgtColIdx)) colMap.set(tgtColIdx, []);
            colMap.get(tgtColIdx).push({ src: issue.src, firstTgt: issue.firstTgt, currentTgt: tgt });
          } else {
            if (!first.has(rowIdx)) first.set(rowIdx, new Set());
            first.get(rowIdx).add(tgtColIdx);
          }
        }
      }
    }
  }
  return { bad, first, rMap };
}

// ── ANALYZE ──
$('analyzeBtn').addEventListener('click', doAnalyze);

function doAnalyze() {
  const srcColIdx    = getSrcColIdx();
  const tgtColIdxArr = getTgtColIdxArr();
  if (!tgtColIdxArr.length) { alert('비교 열을 하나 이상 선택해 주세요.'); return; }

  analysisResult = analyzeConsistency(dataRows, headers, srcColIdx, tgtColIdxArr, getMode());
  const sets = buildIssueSets(analysisResult);
  badSet    = sets.bad;
  firstSet  = sets.first;
  resultMap = sets.rMap;

  let total = 0;
  for (const [, { issues }] of analysisResult) total += issues.length;
  $('statIssue').textContent = `불일치 ${total}`;

  renderIssues(srcColIdx, tgtColIdxArr);
  $('downloadBtn').disabled = false;
}

// ── RENDER ISSUES ──
function renderIssues(srcColIdx, tgtColIdxArr) {
  const area = $('issueArea');
  area.innerHTML = '';
  $('emptyState').style.display = 'none';
  area.style.display = '';

  let totalIssues = 0;
  let okCols = 0;
  for (const [, { issues }] of analysisResult) {
    if (issues.length) totalIssues += issues.length;
    else okCols++;
  }

  // 요약 바
  const bar = document.createElement('div');
  bar.className = 'summary-bar';
  if (totalIssues) {
    const c1 = document.createElement('span');
    c1.className = 's-chip';
    c1.textContent = `불일치 ${totalIssues}건`;
    bar.appendChild(c1);
  }
  if (okCols) {
    const c2 = document.createElement('span');
    c2.className = 's-chip ok';
    c2.textContent = `이상 없는 열 ${okCols}개`;
    bar.appendChild(c2);
  }
  const c3 = document.createElement('span');
  c3.className = 's-chip info';
  c3.textContent = `전체 ${dataRows.length}행 · ${tgtColIdxArr.length}개 비교 열`;
  bar.appendChild(c3);
  area.appendChild(bar);

  // 카드 렌더
  for (const [colName, { issues }] of analysisResult) {
    const card = document.createElement('div');
    card.className = 'issue-card';

    // 카드 헤더
    const head = document.createElement('div');
    head.className = 'icard-head';
    if (issues.length) {
      head.innerHTML = `<span class="icard-colname">${escHtml(colName)}</span>`
        + `<span class="icard-count">${issues.length}개 불일치</span>`;
    } else {
      head.innerHTML = `<span class="icard-colname">${escHtml(colName)}</span>`
        + `<span class="icard-ok">✓ 이상 없음</span>`;
    }
    card.appendChild(head);

    if (!issues.length) { area.appendChild(card); continue; }

    // 테이블
    const table = document.createElement('table');
    table.className = 'icard-table';
    table.innerHTML = `<thead><tr>
      <th>원본 (기준 단어)</th>
      <th>최초 번역</th>
      <th>불일치 번역</th>
      <th>행 번호 (Excel)</th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');

    for (const issue of issues) {
      // 불일치 번역만 수집 (firstTgt 제외)
      const diffs = [...issue.variants.entries()].filter(([tgt]) => tgt !== issue.firstTgt);
      const rowCount = diffs.length;

      diffs.forEach(([tgt, rowIdxArr], di) => {
        const tr = document.createElement('tr');
        if (di === 0) tr.className = 'grp-first';

        // 원본 셀 (rowspan)
        if (di === 0) {
          const tdSrc = document.createElement('td');
          tdSrc.className = 'td-src';
          tdSrc.rowSpan = rowCount;
          tdSrc.textContent = issue.src;
          tr.appendChild(tdSrc);

          // 최초 번역 셀 (rowspan)
          const tdFirst = document.createElement('td');
          tdFirst.className = 'td-first';
          tdFirst.rowSpan = rowCount;
          const bFirst = document.createElement('span');
          bFirst.className = 'badge-first'; bFirst.textContent = '최초';
          tdFirst.appendChild(bFirst);
          tdFirst.appendChild(document.createTextNode(issue.firstTgt || '(비어있음)'));
          tr.appendChild(tdFirst);
        }

        // 불일치 번역
        const tdBad = document.createElement('td');
        tdBad.className = 'td-bad';
        const bBad = document.createElement('span');
        bBad.className = 'badge-bad'; bBad.textContent = '불일치';
        tdBad.appendChild(bBad);
        tdBad.appendChild(document.createTextNode(tgt || '(비어있음)'));
        tr.appendChild(tdBad);

        // 행 번호
        const tdRows = document.createElement('td');
        tdRows.className = 'td-rows';
        const nums = rowIdxArr.slice(0, 10).map(i => i + 2).join(', ');
        tdRows.textContent = nums + (rowIdxArr.length > 10 ? ` 외 ${rowIdxArr.length - 10}건` : '');
        tr.appendChild(tdRows);

        tbody.appendChild(tr);
      });
    }

    table.appendChild(tbody);
    card.appendChild(table);
    area.appendChild(card);
  }
}

// ── EXCEL DOWNLOAD ──
$('downloadBtn').addEventListener('click', downloadExcel);

async function downloadExcel() {
  if (!analysisResult || !dataRows.length) return;
  const btn = $('downloadBtn');
  btn.disabled = true; btn.textContent = '생성 중...';

  try {
    const srcColIdx    = getSrcColIdx();
    const tgtColIdxArr = getTgtColIdxArr();
    const tgtSet       = new Set(tgtColIdxArr);

    const resultCols = [...analysisResult.entries()].map(([colName, { tgtColIdx }]) => ({
      colName, tgtColIdx, header: `${colName}_검수결과`
    }));

    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('단어일치검수');

    // 헤더 행
    const headerRow = ws.addRow([...headers, ...resultCols.map(rc => rc.header)]);
    headerRow.height = 20;
    headerRow.eachCell((cell, colNum) => {
      const ci = colNum - 1;
      if (ci === srcColIdx) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A3A5C' } };
        cell.font = { bold: true, color: { argb: 'FF79C0FF' }, size: 11 };
      } else if (ci < headers.length && tgtSet.has(ci)) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF5C3A00' } };
        cell.font = { bold: true, color: { argb: 'FFFFA657' }, size: 11 };
      } else if (ci >= headers.length) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4A3000' } };
        cell.font = { bold: true, color: { argb: 'FFFFCC80' }, size: 11 };
      } else {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2C3E50' } };
        cell.font = { bold: true, color: { argb: 'FFE6EDF3' }, size: 11 };
      }
      cell.border  = { bottom: { style: 'medium', color: { argb: 'FF555555' } } };
      cell.alignment = { vertical: 'middle' };
    });

    ws.views = [{ state: 'frozen', ySplit: 1 }];

    // 데이터 행
    dataRows.forEach((row, rowIdx) => {
      const resultVals = resultCols.map(rc => {
        if (!resultMap.has(rowIdx) || !resultMap.get(rowIdx).has(rc.tgtColIdx)) return '';
        const issues = resultMap.get(rowIdx).get(rc.tgtColIdx);
        if (issues.length === 1) {
          return `불일치 (최초: ${issues[0].firstTgt || '(비어있음)'})`;
        }
        return '불일치\n' + issues.map(is => `[${is.src}] 최초: ${is.firstTgt || '(비어있음)'}`).join('\n');
      });

      const excelRow = ws.addRow([...row, ...resultVals]);

      excelRow.eachCell({ includeEmpty: true }, (cell, colNum) => {
        const ci = colNum - 1;
        if (ci < headers.length) {
          if (badSet.has(rowIdx) && badSet.get(rowIdx).has(ci)) {
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFE0B2' } };
            cell.font = { bold: true, color: { argb: 'FFC45300' } };
          }
        } else {
          const rcIdx = ci - headers.length;
          const rc = resultCols[rcIdx];
          if (rc && resultMap.has(rowIdx) && resultMap.get(rowIdx).has(rc.tgtColIdx)) {
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF3E0' } };
            cell.font = { color: { argb: 'FFB94000' } };
            cell.alignment = { wrapText: true, vertical: 'top' };
          }
        }
      });
    });

    // 열 너비
    ws.columns.forEach((col, ci) => {
      if (ci >= headers.length) { col.width = 32; return; }
      let maxLen = (headers[ci] || '').length + 2;
      col.eachCell({ includeEmpty: false }, cell => {
        const len = String(cell.value ?? '').length;
        if (len > maxLen) maxLen = len;
      });
      col.width = Math.min(maxLen + 2, 42);
    });

    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = '단어일치검수_결과.xlsx';
    a.click();
    URL.revokeObjectURL(url);
  } finally {
    btn.disabled = false; btn.textContent = '엑셀 내보내기';
  }
}

// ── MODE GROUP ──
document.querySelectorAll('.mode-group label').forEach(label => {
  label.addEventListener('click', () => {
    document.querySelectorAll('.mode-group label').forEach(l => l.classList.remove('active'));
    label.classList.add('active');
    const r = label.querySelector('input'); if (r) r.checked = true;
  });
});
const initActive = document.querySelector('.mode-group label:has(input:checked)');
if (initActive) initActive.classList.add('active');

// ── NAV ACTIVE ──
const curPage = (location.pathname.split('/').pop() || '').toLowerCase();
document.querySelectorAll('.nav a[data-page]').forEach(a => {
  if ((a.dataset.page || '').toLowerCase() === curPage) a.classList.add('active');
});
